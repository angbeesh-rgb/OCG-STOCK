<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>듀얼 스톡 — OCG 카드 재고</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&family=Cinzel:wght@600;800&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#0c0e16; --panel:#14172a; --panel-2:#1c2038;
  --gold:#c9a24b; --gold-bright:#e8c873; --violet:#6a4fb0;
  --text:#eef0f6; --text-dim:#9aa0b8;
  --danger:#c75c5c; --ok:#5fbf7f;
  --line:rgba(201,162,75,0.22); --radius:14px;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;}
body{
  margin:0;
  background:radial-gradient(1200px 600px at 50% -10%,rgba(106,79,176,.25),transparent 60%),var(--ink);
  color:var(--text);font-family:'Noto Sans KR',sans-serif;
  display:flex;flex-direction:column;min-height:100vh;overflow-x:hidden;
}
.cinzel{font-family:'Cinzel',serif;letter-spacing:.04em;}

/* Header */
header.app{
  padding:18px 18px 14px;display:flex;align-items:center;justify-content:space-between;
  border-bottom:1px solid var(--line);
  background:linear-gradient(180deg,rgba(28,32,56,.9),rgba(12,14,22,.4));
  position:sticky;top:0;z-index:20;backdrop-filter:blur(6px);
}
header.app h1{font-size:18px;margin:0;font-weight:800;color:var(--gold-bright);}
header.app .eyebrow{font-size:10px;letter-spacing:.2em;color:var(--text-dim);text-transform:uppercase;margin-bottom:2px;}
.mode-toggle{display:flex;background:var(--panel-2);border-radius:999px;padding:3px;border:1px solid var(--line);}
.mode-toggle button{
  border:none;background:transparent;color:var(--text-dim);font-weight:700;font-size:13px;
  padding:7px 14px;border-radius:999px;cursor:pointer;transition:.2s;
}
.mode-toggle button.active.in{background:var(--ok);color:#0c1a10;}
.mode-toggle button.active.out{background:var(--danger);color:#1a0c0c;}

main{flex:1;padding:16px;padding-bottom:90px;max-width:520px;margin:0 auto;width:100%;}
.screen{display:none;}
.screen.active{display:block;}

/* Camera */
.cam-wrap{
  position:relative;width:100%;aspect-ratio:3/4;border-radius:var(--radius);overflow:hidden;
  background:#000;border:1px solid var(--line);
}
video{width:100%;height:100%;object-fit:cover;display:block;}
canvas#shot{display:none;}
.guide{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none;}
.guide-box{
  width:70%;aspect-ratio:.685;border:2.5px dashed var(--gold);border-radius:10px;
  box-shadow:0 0 0 9999px rgba(0,0,0,.45);transition:border-color .15s,box-shadow .15s;
}
.guide-box.stable{border-color:var(--ok);border-style:solid;}
.cam-status{position:absolute;bottom:10px;left:0;right:0;text-align:center;font-size:12px;color:var(--text-dim);pointer-events:none;}
.progress-ring{
  position:absolute;top:10px;right:10px;width:36px;height:36px;border-radius:50%;
  border:3px solid rgba(255,255,255,.15);border-top-color:var(--gold-bright);display:none;
}
.progress-ring.spin{display:block;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.cam-tip{margin-top:12px;font-size:13px;color:var(--text-dim);text-align:center;line-height:1.6;}
.cam-tip b{color:var(--gold-bright);font-weight:700;}
.cam-start{
  margin-top:14px;width:100%;padding:14px;border-radius:12px;border:none;
  background:linear-gradient(135deg,var(--gold),var(--violet));color:#0c0e16;font-weight:800;font-size:15px;cursor:pointer;
}

/* ── Overlay / Sheet ── */
.overlay{
  position:fixed;inset:0;background:rgba(5,6,12,.75);backdrop-filter:blur(4px);
  display:none;align-items:flex-end;justify-content:center;z-index:50;
}
.overlay.show{display:flex;}
.sheet{
  width:100%;max-width:520px;background:var(--panel);border-radius:18px 18px 0 0;
  border:1px solid var(--line);border-bottom:none;padding:20px;animation:up .22s ease-out;
  max-height:90vh;overflow-y:auto;
}
@keyframes up{from{transform:translateY(30px);opacity:0;}to{transform:translateY(0);opacity:1;}}

/* 인식결과 헤더 */
.sheet-head{display:flex;gap:12px;align-items:flex-start;margin-bottom:16px;}
.card-thumb{
  width:56px;height:78px;border-radius:7px;flex-shrink:0;
  background:linear-gradient(155deg,var(--violet),#2a2150);
  display:flex;align-items:center;justify-content:center;
  font-size:11px;color:var(--text-dim);border:1px solid var(--line);
  text-align:center;padding:4px;line-height:1.3;
}
.sheet-head .name{font-weight:800;font-size:16px;margin-bottom:4px;}
.sheet-head .meta{font-size:12px;color:var(--text-dim);}

/* 일러스트 선택 그리드 */
.field-label{font-size:11px;color:var(--gold-bright);letter-spacing:.1em;text-transform:uppercase;margin:14px 0 8px;}
.illust-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
.illust-card{
  background:var(--panel-2);border:2px solid var(--line);border-radius:10px;
  padding:8px 6px;cursor:pointer;text-align:center;transition:.15s;
}
.illust-card.selected{border-color:var(--gold-bright);background:rgba(201,162,75,.1);}
.illust-card .ic-thumb{
  width:100%;aspect-ratio:.685;border-radius:5px;margin-bottom:6px;
  background:linear-gradient(155deg,var(--violet),#2a2150);
  display:flex;align-items:center;justify-content:center;font-size:9px;color:var(--text-dim);
}
.illust-card .ic-code{font-size:10px;color:var(--gold-bright);font-weight:700;}
.illust-card .ic-label{font-size:10px;color:var(--text-dim);margin-top:2px;line-height:1.2;}

select.rarity{
  width:100%;padding:12px;border-radius:10px;background:var(--panel-2);
  border:1px solid var(--line);color:var(--text);font-size:14px;font-weight:600;
}
.stepper{display:flex;align-items:center;gap:14px;justify-content:center;margin-top:6px;}
.stepper button{
  width:44px;height:44px;border-radius:50%;border:1px solid var(--line);background:var(--panel-2);
  color:var(--gold-bright);font-size:22px;font-weight:800;cursor:pointer;
}
.stepper .qty{font-size:26px;font-weight:800;min-width:46px;text-align:center;}
.sheet-actions{display:flex;gap:10px;margin-top:20px;}
.sheet-actions button{flex:1;padding:13px;border-radius:10px;border:none;font-weight:800;font-size:14px;cursor:pointer;}
.btn-cancel{background:var(--panel-2);color:var(--text-dim);border:1px solid var(--line) !important;}
.btn-confirm.in{background:var(--ok);color:#0c1a10;}
.btn-confirm.out{background:var(--danger);color:#1a0c0c;}

/* Search */
.search-bar{display:flex;gap:8px;margin-bottom:14px;}
.search-bar input{
  flex:1;padding:13px 14px;border-radius:10px;background:var(--panel-2);
  border:1px solid var(--line);color:var(--text);font-size:14px;
}
.card-group{background:var(--panel);border:1px solid var(--line);border-radius:12px;margin-bottom:12px;overflow:hidden;}
.group-header{padding:12px 14px 10px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--line);}
.group-name{font-weight:800;font-size:14px;}
.print-row{
  display:flex;align-items:center;gap:10px;padding:10px 14px;
  border-bottom:1px solid rgba(201,162,75,.1);
}
.print-row:last-child{border-bottom:none;}
.print-thumb{
  width:36px;height:50px;border-radius:5px;flex-shrink:0;
  background:linear-gradient(155deg,var(--violet),#2a2150);
  display:flex;align-items:center;justify-content:center;font-size:8px;color:var(--text-dim);
}
.print-info{flex:1;}
.print-code{font-size:11px;color:var(--gold-bright);font-weight:700;}
.print-illust{font-size:11px;color:var(--text-dim);margin-top:1px;}
.rarity-badges{display:flex;flex-wrap:wrap;gap:5px;margin-top:5px;}
.rarity-badge{
  font-size:11px;padding:2px 8px;border-radius:999px;
  background:var(--panel-2);border:1px solid var(--line);
}
.rarity-badge .bqty{color:var(--gold-bright);font-weight:800;margin-left:4px;}
.rarity-badge.zero{opacity:.35;}
.empty{text-align:center;color:var(--text-dim);font-size:13px;padding:30px 0;}

/* Log */
.log-row{
  display:flex;justify-content:space-between;align-items:flex-start;
  padding:11px 0;border-bottom:1px solid var(--line);font-size:13px;gap:8px;
}
.log-row .tag{font-size:10px;font-weight:800;padding:3px 8px;border-radius:999px;margin-right:6px;white-space:nowrap;}
.tag.in{background:rgba(95,191,127,.18);color:var(--ok);}
.tag.out{background:rgba(199,92,92,.18);color:var(--danger);}
.log-sub{font-size:11px;color:var(--text-dim);margin-top:2px;}
.log-time{color:var(--text-dim);font-size:11px;white-space:nowrap;}

/* Toast */
.toast{
  position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(20px);
  background:var(--panel-2);border:1px solid var(--gold);color:var(--text);
  padding:10px 18px;border-radius:999px;font-size:13px;font-weight:700;
  opacity:0;transition:.25s;z-index:60;pointer-events:none;white-space:nowrap;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* Nav */
nav.tabbar{
  position:fixed;bottom:0;left:0;right:0;background:var(--panel);
  border-top:1px solid var(--line);display:flex;z-index:30;
  padding-bottom:env(safe-area-inset-bottom);
}
nav.tabbar button{
  flex:1;padding:12px 0 10px;background:none;border:none;color:var(--text-dim);
  display:flex;flex-direction:column;align-items:center;gap:4px;font-size:11px;cursor:pointer;
}
nav.tabbar button.active{color:var(--gold-bright);}
</style>
</head>
<body>

<header class="app">
  <div>
    <div class="eyebrow">Duel Stock</div>
    <h1 class="cinzel">카드 재고</h1>
  </div>
  <div class="mode-toggle">
    <button id="modeInBtn" class="active in">입고</button>
    <button id="modeOutBtn" class="out">출고</button>
  </div>
</header>

<main>
  <!-- 카메라 -->
  <section class="screen active" id="screen-cam">
    <div class="cam-wrap">
      <video id="video" playsinline muted></video>
      <canvas id="shot"></canvas>
      <div class="guide"><div class="guide-box" id="guideBox"></div></div>
      <div class="progress-ring" id="ring"></div>
      <div class="cam-status" id="camStatus">카메라를 시작해줘</div>
    </div>
    <div class="cam-tip">카드를 가이드 박스에 맞추고 <b>가만히</b> 있으면 자동으로 인식돼.<br>촬영된 이미지는 저장되지 않아.</div>
    <button class="cam-start" id="camStartBtn">카메라 시작</button>
  </section>

  <!-- 검색 -->
  <section class="screen" id="screen-search">
    <div class="search-bar">
      <input type="text" id="searchInput" placeholder="카드명으로 검색...">
    </div>
    <div id="searchResults"></div>
  </section>

  <!-- 로그 -->
  <section class="screen" id="screen-log">
    <div id="logList"></div>
  </section>
</main>

<!-- 인식/선택 모달 -->
<div class="overlay" id="overlay">
  <div class="sheet">
    <!-- 카드명 헤더 -->
    <div class="sheet-head">
      <div class="card-thumb" id="modalThumb">CARD</div>
      <div>
        <div class="name" id="modalName">-</div>
        <div class="meta" id="modalMeta">-</div>
        <div class="meta" id="modalMode" style="margin-top:4px;color:var(--gold-bright);">입고 처리</div>
      </div>
    </div>

    <!-- 일러스트 선택 -->
    <div class="field-label">일러스트 / 인쇄판 선택</div>
    <div class="illust-grid" id="illustGrid"></div>

    <!-- 레어도 -->
    <div class="field-label">레어도</div>
    <select class="rarity" id="raritySelect"></select>

    <!-- 매수 -->
    <div class="field-label">매수</div>
    <div class="stepper">
      <button id="qtyMinus">−</button>
      <div class="qty" id="qtyVal">1</div>
      <button id="qtyPlus">+</button>
    </div>

    <div class="sheet-actions">
      <button class="btn-cancel" id="cancelBtn">취소</button>
      <button class="btn-confirm" id="confirmBtn">저장</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<nav class="tabbar">
  <button class="tab-btn active" data-screen="cam">📷 인식</button>
  <button class="tab-btn" data-screen="search">🔍 검색</button>
  <button class="tab-btn" data-screen="log">🧾 로그</button>
</nav>

<script>
/* ==========================================================================
   카드 마스터 데이터 (목업)
   실제 서비스 → YGOPRODECK API 또는 자체 DB로 교체
   prints 배열의 각 항목 = "카드번호 단위 인쇄판" → 일러스트 구분 기준

   Firestore 구조 예시
   ─────────────────────────────────────────────
   cards/{cardName_slug}
     name: "블랙 매지션"
     prints: [{ printId, illustLabel, rarities }]

   inventory/{printId}_{rarity}
     cardName, printId, illustLabel, rarity, quantity, updatedAt

   transactions/{autoId}
     cardName, printId, illustLabel, rarity, type, amount, resultQty, timestamp
   ========================================================================== */
const MOCK_CARDS = [
  {
    id: 'black-magician',
    name: '블랙 매지션',
    prints: [
      { printId:'LOB-K003', illustLabel:'초기판 (LOB)', rarities:['노멀','울트라레어'] },
      { printId:'SDY-K006', illustLabel:'스트럭처덱판 (SDY)', rarities:['노멀'] },
      { printId:'MFC-K051', illustLabel:'마법사의 심판판 (MFC)', rarities:['울트라레어','시크릿레어'] },
    ]
  },
  {
    id: 'blue-eyes',
    name: '푸른 눈의 백룡',
    prints: [
      { printId:'LOB-K001', illustLabel:'초기판 (LOB)', rarities:['울트라레어'] },
      { printId:'SDK-K001', illustLabel:'카이바덱판 (SDK)', rarities:['울트라레어'] },
    ]
  },
  {
    id: 'red-eyes',
    name: '붉은 눈의 흑룡',
    prints: [
      { printId:'LOB-K070', illustLabel:'초기판 (LOB)', rarities:['레어','울트라레어'] },
      { printId:'SDP-K001', illustLabel:'조이덱판 (SDP)', rarities:['노멀'] },
    ]
  },
];

/* ==========================================================================
   로컬 DB 레이어
   Firebase Firestore 전환 시 read/write 함수만 교체하면 됨
   재고 키: `{printId}||{rarity}` (|| 구분자로 복합키 구성)
   ========================================================================== */
const DB = {
  CARDS_KEY:  'ocg_cards_master',
  INV_KEY:    'ocg_inventory',
  TX_KEY:     'ocg_transactions',

  read(k, fb){ try{ return JSON.parse(localStorage.getItem(k)) ?? fb; }catch(e){ return fb; } },
  write(k, v){ localStorage.setItem(k, JSON.stringify(v)); },

  getCards(){ return this.read(this.CARDS_KEY, MOCK_CARDS); },
  getInventory(){ return this.read(this.INV_KEY, {}); },
  getTx(){ return this.read(this.TX_KEY, []); },

  // 재고 조회 — printId + rarity 조합으로 조회
  getStock(printId, rarity){
    const inv = this.getInventory();
    return inv[printId + '||' + rarity]?.quantity || 0;
  },

  // 입출고 반영
  upsertInventory(cardName, printId, illustLabel, rarity, delta){
    const inv = this.getInventory();
    const key = printId + '||' + rarity;
    const prev = inv[key]?.quantity || 0;
    const next = Math.max(0, prev + delta);
    inv[key] = { cardName, printId, illustLabel, rarity, quantity:next, updatedAt:Date.now() };
    this.write(this.INV_KEY, inv);
    return next;
  },

  addTx(entry){
    const tx = this.getTx();
    tx.unshift(entry);
    this.write(this.TX_KEY, tx.slice(0, 300));
  }
};

// 최초 마스터 데이터 세팅
if(!localStorage.getItem(DB.CARDS_KEY)) DB.write(DB.CARDS_KEY, MOCK_CARDS);

/* ==========================================================================
   모드 (입고 / 출고)
   ========================================================================== */
let mode = 'in';
document.getElementById('modeInBtn').addEventListener('click', () => setMode('in'));
document.getElementById('modeOutBtn').addEventListener('click', () => setMode('out'));
function setMode(m){
  mode = m;
  document.getElementById('modeInBtn').classList.toggle('active', m==='in');
  document.getElementById('modeOutBtn').classList.toggle('active', m==='out');
}

/* ==========================================================================
   카메라 / 자동인식
   ========================================================================== */
let detecting=false, stableCount=0, lastFrameData=null, overlayOpen=false;
const STABLE_THRESHOLD=6, DIFF_TOL=10;
let mockCycle=0;
const video=document.getElementById('video');
const guideBox=document.getElementById('guideBox');
const camStatus=document.getElementById('camStatus');
const ring=document.getElementById('ring');

document.getElementById('camStartBtn').addEventListener('click', startCamera);

async function startCamera(){
  try{
    const stream = await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'},audio:false});
    video.srcObject = stream;
    await video.play();
    document.getElementById('camStartBtn').style.display='none';
    camStatus.textContent='카드를 가이드 안에 맞춰줘';
    detecting=true;
    requestAnimationFrame(detectLoop);
  }catch(err){
    camStatus.textContent='카메라 권한이 필요해 ('+err.message+')';
  }
}

let lastTick=0;
function detectLoop(ts){
  if(!detecting) return;
  if(ts-lastTick>250){ lastTick=ts; checkFrame(); }
  requestAnimationFrame(detectLoop);
}

const shotCanvas=document.getElementById('shot');
function checkFrame(){
  if(video.readyState<2||overlayOpen) return;
  const ctx=shotCanvas.getContext('2d',{willReadFrequently:true});
  const W=80, H=Math.round(80/0.685);
  shotCanvas.width=W; shotCanvas.height=H;
  ctx.drawImage(video,0,0,W,H);
  const frame=ctx.getImageData(0,0,W,H).data;

  if(lastFrameData){
    let diff=0;
    for(let i=0;i<frame.length;i+=4) diff+=Math.abs(frame[i]-lastFrameData[i]);
    const avg=diff/(frame.length/4);

    if(avg<DIFF_TOL){
      stableCount++;
      guideBox.classList.add('stable');
      camStatus.textContent=`인식 중... (${Math.min(stableCount,STABLE_THRESHOLD)}/${STABLE_THRESHOLD})`;
    }else{
      stableCount=0;
      guideBox.classList.remove('stable');
      camStatus.textContent='카드를 가이드 안에 맞춰줘';
    }
    if(stableCount>=STABLE_THRESHOLD){ stableCount=0; runRecognition(); }
  }
  lastFrameData=frame;
}

function runRecognition(){
  ring.classList.add('spin');
  camStatus.textContent='카드 매칭 중...';
  // ↓ 실제 이미지 임베딩 모델 호출 자리
  // 지금은 데모: 카드를 순환하며 반환, printId까지 구분해서 넘김
  setTimeout(()=>{
    ring.classList.remove('spin');
    const cards=DB.getCards();
    const card=cards[mockCycle%cards.length];
    mockCycle++;
    // 실제 모델은 가장 유사한 printId(일러스트)까지 특정해줌
    // 여기선 그 카드의 첫 번째 인쇄판을 "인식 결과"로 넘김
    openSheet(card, card.prints[0].printId);
    // 캡처 이미지 데이터는 여기서 스코프 종료 → 자동 폐기
  }, 400);
}

/* ==========================================================================
   모달
   ========================================================================== */
let currentCard=null, currentPrint=null, currentQty=1;
const overlay=document.getElementById('overlay');
const illustGrid=document.getElementById('illustGrid');
const raritySelect=document.getElementById('raritySelect');

// printId: 인식 모델이 특정한 인쇄판 (일러스트 구분 단위)
function openSheet(card, detectedPrintId){
  currentCard=card; currentQty=1;
  document.getElementById('modalThumb').textContent=card.name.slice(0,2);
  document.getElementById('modalName').textContent=card.name;
  document.getElementById('modalMode').textContent=mode==='in'?'입고 처리':'출고 처리';
  document.getElementById('qtyVal').textContent=1;
  document.getElementById('confirmBtn').className='btn-confirm '+mode;
  document.getElementById('confirmBtn').textContent=mode==='in'?'입고 저장':'출고 저장';

  // 일러스트 그리드 렌더
  illustGrid.innerHTML='';
  card.prints.forEach(p=>{
    const div=document.createElement('div');
    div.className='illust-card'+(p.printId===detectedPrintId?' selected':'');
    div.innerHTML=`
      <div class="ic-thumb">${p.printId.split('-')[0]}</div>
      <div class="ic-code">${p.printId}</div>
      <div class="ic-label">${p.illustLabel}</div>`;
    div.addEventListener('click',()=>{
      illustGrid.querySelectorAll('.illust-card').forEach(c=>c.classList.remove('selected'));
      div.classList.add('selected');
      selectPrint(p);
    });
    illustGrid.appendChild(div);
  });

  // 인식된 인쇄판 기본 선택
  const matched=card.prints.find(p=>p.printId===detectedPrintId)||card.prints[0];
  selectPrint(matched);

  // 부가 메타
  document.getElementById('modalMeta').textContent=
    card.prints.length>1
      ? `이 카드는 ${card.prints.length}가지 인쇄판이 있어 — 아래서 골라줘`
      : `인쇄판: ${matched.illustLabel}`;

  overlay.classList.add('show');
  overlayOpen=true;
}

function selectPrint(p){
  currentPrint=p;
  raritySelect.innerHTML='';
  p.rarities.forEach(r=>{
    const o=document.createElement('option');
    const qty=DB.getStock(p.printId,r);
    o.value=r; o.textContent=`${r}  (현재 ${qty}장)`;
    raritySelect.appendChild(o);
  });
}

function closeSheet(){
  overlay.classList.remove('show');
  overlayOpen=false;
  currentCard=null; currentPrint=null;
}

document.getElementById('qtyPlus').addEventListener('click',()=>{
  currentQty++; document.getElementById('qtyVal').textContent=currentQty;
});
document.getElementById('qtyMinus').addEventListener('click',()=>{
  currentQty=Math.max(1,currentQty-1); document.getElementById('qtyVal').textContent=currentQty;
});
document.getElementById('cancelBtn').addEventListener('click',closeSheet);

document.getElementById('confirmBtn').addEventListener('click',()=>{
  if(!currentCard||!currentPrint) return;
  const rarity=raritySelect.value;
  const delta=mode==='in'?currentQty:-currentQty;

  if(mode==='out'&&DB.getStock(currentPrint.printId,rarity)<currentQty){
    showToast('⚠ 재고가 부족해!'); return;
  }

  const newQty=DB.upsertInventory(
    currentCard.name, currentPrint.printId, currentPrint.illustLabel, rarity, delta
  );
  DB.addTx({
    cardName:currentCard.name, printId:currentPrint.printId,
    illustLabel:currentPrint.illustLabel, rarity,
    type:mode, amount:currentQty, resultQty:newQty, timestamp:Date.now()
  });

  showToast(`${currentCard.name} [${currentPrint.printId}] ${rarity} ${mode==='in'?'+':'-'}${currentQty}장 → ${newQty}장`);
  closeSheet();
  renderLog();
});

/* ==========================================================================
   검색
   ========================================================================== */
document.getElementById('searchInput').addEventListener('input', renderSearch);

function renderSearch(){
  const q=document.getElementById('searchInput').value.trim();
  const cards=DB.getCards();
  const inv=DB.getInventory();
  const matched=q?cards.filter(c=>c.name.includes(q)):cards;

  if(!matched.length){
    document.getElementById('searchResults').innerHTML='<div class="empty">검색 결과가 없어</div>';
    return;
  }

  document.getElementById('searchResults').innerHTML=matched.map(card=>{
    const printRows=card.prints.map(p=>{
      const badges=p.rarities.map(r=>{
        const key=p.printId+'||'+r;
        const qty=inv[key]?.quantity||0;
        return `<span class="rarity-badge ${qty===0?'zero':''}">${r}<span class="bqty">${qty}장</span></span>`;
      }).join('');
      return `
        <div class="print-row">
          <div class="print-thumb">${p.printId.split('-')[0]}</div>
          <div class="print-info">
            <div class="print-code">${p.printId}</div>
            <div class="print-illust">${p.illustLabel}</div>
            <div class="rarity-badges">${badges}</div>
          </div>
        </div>`;
    }).join('');

    return `
      <div class="card-group">
        <div class="group-header">
          <div class="group-name">${card.name}</div>
          <span style="font-size:11px;color:var(--text-dim)">${card.prints.length}가지 인쇄판</span>
        </div>
        ${printRows}
      </div>`;
  }).join('');
}

/* ==========================================================================
   로그
   ========================================================================== */
function renderLog(){
  const tx=DB.getTx();
  if(!tx.length){
    document.getElementById('logList').innerHTML='<div class="empty">아직 거래 기록이 없어</div>';
    return;
  }
  document.getElementById('logList').innerHTML=tx.map(t=>{
    const time=new Date(t.timestamp).toLocaleString('ko-KR',{month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'});
    return `
      <div class="log-row">
        <div>
          <span class="tag ${t.type}">${t.type==='in'?'입고':'출고'}</span>${t.cardName} ${t.amount}장
          <div class="log-sub">${t.printId} · ${t.illustLabel} · ${t.rarity} → 잔여 ${t.resultQty}장</div>
        </div>
        <div class="log-time">${time}</div>
      </div>`;
  }).join('');
}

/* ==========================================================================
   탭
   ========================================================================== */
document.querySelectorAll('.tab-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
    document.getElementById('screen-'+btn.dataset.screen).classList.add('active');
    if(btn.dataset.screen==='search') renderSearch();
    if(btn.dataset.screen==='log') renderLog();
  });
});

/* ==========================================================================
   토스트
   ========================================================================== */
const toastEl=document.getElementById('toast');
let toastTimer=null;
function showToast(msg){
  toastEl.textContent=msg;
  toastEl.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>toastEl.classList.remove('show'),2400);
}

renderSearch();
renderLog();
</script>
</body>
</html>
