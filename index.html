<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>듀얼 스톡 — OCG 카드 재고</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&family=Cinzel:wght@600;800&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#0c0e16;--panel:#14172a;--panel-2:#1c2038;
  --gold:#c9a24b;--gold-bright:#e8c873;--violet:#6a4fb0;
  --text:#eef0f6;--text-dim:#9aa0b8;
  --danger:#c75c5c;--ok:#5fbf7f;
  --line:rgba(201,162,75,0.22);--radius:14px;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;}
body{
  margin:0;
  background:radial-gradient(1200px 600px at 50% -10%,rgba(106,79,176,.25),transparent 60%),var(--ink);
  color:var(--text);font-family:'Noto Sans KR',sans-serif;
  display:flex;flex-direction:column;min-height:100vh;overflow-x:hidden;
}
.cinzel{font-family:'Cinzel',serif;letter-spacing:.04em;}

header.app{
  padding:18px 18px 14px;display:flex;align-items:center;justify-content:space-between;
  border-bottom:1px solid var(--line);
  background:linear-gradient(180deg,rgba(28,32,56,.9),rgba(12,14,22,.4));
  position:sticky;top:0;z-index:20;backdrop-filter:blur(6px);
}
header.app h1{font-size:18px;margin:0;font-weight:800;color:var(--gold-bright);}
header.app .eyebrow{font-size:10px;letter-spacing:.2em;color:var(--text-dim);text-transform:uppercase;margin-bottom:2px;}
.mode-toggle{display:flex;background:var(--panel-2);border-radius:999px;padding:3px;border:1px solid var(--line);}
.mode-toggle button{
  border:none;background:transparent;color:var(--text-dim);font-weight:700;font-size:13px;
  padding:7px 14px;border-radius:999px;cursor:pointer;transition:.2s;
}
.mode-toggle button.active.in{background:var(--ok);color:#0c1a10;}
.mode-toggle button.active.out{background:var(--danger);color:#1a0c0c;}

main{flex:1;padding:16px;padding-bottom:90px;max-width:520px;margin:0 auto;width:100%;}
.screen{display:none;}
.screen.active{display:block;}

/* Camera */
.cam-wrap{
  position:relative;width:100%;aspect-ratio:3/4;border-radius:var(--radius);overflow:hidden;
  background:#000;border:1px solid var(--line);
}
video{width:100%;height:100%;object-fit:cover;display:block;}
canvas#shot{display:none;}
canvas#ocr-preview{
  position:absolute;bottom:0;left:0;width:100%;height:18%;
  opacity:0.35;pointer-events:none;
}
.guide{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none;}
.guide-box{
  width:70%;aspect-ratio:.685;border:2.5px dashed var(--gold);border-radius:10px;
  box-shadow:0 0 0 9999px rgba(0,0,0,.45);transition:border-color .15s;
  position:relative;
}
.guide-box.stable{border-color:var(--ok);border-style:solid;}
/* 카드번호 영역 표시 */
.guide-box::after{
  content:'카드번호';font-size:9px;color:var(--gold-bright);letter-spacing:.1em;
  position:absolute;bottom:6%;left:50%;transform:translateX(-50%);
  background:rgba(0,0,0,.55);padding:2px 7px;border-radius:4px;
  border:1px dashed var(--gold-bright);white-space:nowrap;
}

.cam-status{
  position:absolute;bottom:10px;left:0;right:0;text-align:center;
  font-size:12px;color:var(--text-dim);pointer-events:none;
  text-shadow:0 1px 4px rgba(0,0,0,.8);
}
.ocr-status{
  position:absolute;top:10px;left:10px;right:10px;
  background:rgba(12,14,22,.75);border:1px solid var(--line);border-radius:8px;
  padding:6px 10px;font-size:11px;color:var(--gold-bright);display:none;
  text-align:center;backdrop-filter:blur(3px);
}
.ocr-status.show{display:block;}
.progress-ring{
  position:absolute;top:10px;right:10px;width:36px;height:36px;border-radius:50%;
  border:3px solid rgba(255,255,255,.15);border-top-color:var(--gold-bright);display:none;
}
.progress-ring.spin{display:block;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.cam-tip{margin-top:12px;font-size:13px;color:var(--text-dim);text-align:center;line-height:1.6;}
.cam-tip b{color:var(--gold-bright);font-weight:700;}
.cam-start{
  margin-top:14px;width:100%;padding:14px;border-radius:12px;border:none;
  background:linear-gradient(135deg,var(--gold),var(--violet));color:#0c0e16;
  font-weight:800;font-size:15px;cursor:pointer;
}
.cooldown-bar{
  height:3px;background:var(--panel-2);border-radius:999px;margin-top:10px;overflow:hidden;display:none;
}
.cooldown-bar.show{display:block;}
.cooldown-fill{height:100%;background:var(--gold-bright);width:100%;
  animation:cooldown 2.5s linear forwards;}
@keyframes cooldown{from{width:100%}to{width:0%}}

/* Modal */
.overlay{
  position:fixed;inset:0;background:rgba(5,6,12,.75);backdrop-filter:blur(4px);
  display:none;align-items:flex-end;justify-content:center;z-index:50;
}
.overlay.show{display:flex;}
.sheet{
  width:100%;max-width:520px;background:var(--panel);border-radius:18px 18px 0 0;
  border:1px solid var(--line);border-bottom:none;padding:20px;animation:up .22s ease-out;
  max-height:90vh;overflow-y:auto;
}
@keyframes up{from{transform:translateY(30px);opacity:0;}to{transform:translateY(0);opacity:1;}}
.sheet-head{display:flex;gap:12px;align-items:flex-start;margin-bottom:16px;}
.card-img{
  width:60px;height:83px;border-radius:6px;flex-shrink:0;
  object-fit:cover;border:1px solid var(--line);background:var(--panel-2);
}
.card-img-placeholder{
  width:60px;height:83px;border-radius:6px;flex-shrink:0;
  background:linear-gradient(155deg,var(--violet),#2a2150);
  display:flex;align-items:center;justify-content:center;
  font-size:10px;color:var(--text-dim);border:1px solid var(--line);text-align:center;padding:4px;
}
.sheet-head .name{font-weight:800;font-size:16px;margin-bottom:4px;}
.sheet-head .meta{font-size:12px;color:var(--text-dim);line-height:1.5;}
.field-label{font-size:11px;color:var(--gold-bright);letter-spacing:.1em;text-transform:uppercase;margin:14px 0 8px;}

.illust-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
.illust-card{
  background:var(--panel-2);border:2px solid var(--line);border-radius:10px;
  padding:6px;cursor:pointer;text-align:center;transition:.15s;
}
.illust-card.selected{border-color:var(--gold-bright);background:rgba(201,162,75,.1);}
.illust-card img{width:100%;aspect-ratio:.685;object-fit:cover;border-radius:4px;margin-bottom:4px;}
.illust-card .ic-placeholder{
  width:100%;aspect-ratio:.685;border-radius:4px;margin-bottom:4px;
  background:linear-gradient(155deg,var(--violet),#2a2150);
  display:flex;align-items:center;justify-content:center;font-size:8px;color:var(--text-dim);
}
.illust-card .ic-code{font-size:9px;color:var(--gold-bright);font-weight:700;}
.illust-card .ic-label{font-size:9px;color:var(--text-dim);margin-top:2px;line-height:1.2;}

select.rarity{
  width:100%;padding:12px;border-radius:10px;background:var(--panel-2);
  border:1px solid var(--line);color:var(--text);font-size:14px;font-weight:600;
}
.stepper{display:flex;align-items:center;gap:14px;justify-content:center;margin-top:6px;}
.stepper button{
  width:44px;height:44px;border-radius:50%;border:1px solid var(--line);
  background:var(--panel-2);color:var(--gold-bright);font-size:22px;font-weight:800;cursor:pointer;
}
.stepper .qty{font-size:26px;font-weight:800;min-width:46px;text-align:center;}
.sheet-actions{display:flex;gap:10px;margin-top:20px;}
.sheet-actions button{flex:1;padding:13px;border-radius:10px;border:none;font-weight:800;font-size:14px;cursor:pointer;}
.btn-cancel{background:var(--panel-2);color:var(--text-dim);border:1px solid var(--line)!important;}
.btn-confirm.in{background:var(--ok);color:#0c1a10;}
.btn-confirm.out{background:var(--danger);color:#1a0c0c;}

/* Search */
.search-bar{display:flex;gap:8px;margin-bottom:14px;}
.search-bar input{
  flex:1;padding:13px 14px;border-radius:10px;background:var(--panel-2);
  border:1px solid var(--line);color:var(--text);font-size:14px;
}
.card-group{background:var(--panel);border:1px solid var(--line);border-radius:12px;margin-bottom:12px;overflow:hidden;}
.group-header{padding:12px 14px 10px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--line);}
.group-header img{width:36px;height:50px;object-fit:cover;border-radius:4px;flex-shrink:0;}
.group-name{font-weight:800;font-size:14px;}
.print-row{display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid rgba(201,162,75,.1);}
.print-row:last-child{border-bottom:none;}
.print-thumb{width:32px;height:44px;border-radius:4px;flex-shrink:0;object-fit:cover;background:var(--panel-2);}
.print-info{flex:1;}
.print-code{font-size:11px;color:var(--gold-bright);font-weight:700;}
.print-illust{font-size:11px;color:var(--text-dim);margin-top:1px;}
.rarity-badges{display:flex;flex-wrap:wrap;gap:5px;margin-top:5px;}
.rarity-badge{font-size:11px;padding:2px 8px;border-radius:999px;background:var(--panel-2);border:1px solid var(--line);}
.rarity-badge .bqty{color:var(--gold-bright);font-weight:800;margin-left:4px;}
.rarity-badge.zero{opacity:.35;}
.empty{text-align:center;color:var(--text-dim);font-size:13px;padding:30px 0;}
.sb-btn{
  border:none;border-radius:7px;font-size:11px;font-weight:800;
  padding:5px 9px;cursor:pointer;white-space:nowrap;
}
.sb-in{background:rgba(95,191,127,.18);color:var(--ok);border:1px solid rgba(95,191,127,.3);}
.sb-out{background:rgba(199,92,92,.18);color:var(--danger);border:1px solid rgba(199,92,92,.3);}
.manual-input{
  width:100%;padding:12px 14px;border-radius:10px;background:var(--panel-2);
  border:1px solid var(--line);color:var(--text);font-size:14px;
  margin-bottom:4px;outline:none;
}
.manual-input::placeholder{color:var(--text-dim);}
.manual-input:focus{border-color:var(--gold);}
.focus-ring{
  position:absolute;width:60px;height:60px;border:2px solid var(--gold-bright);
  border-radius:50%;pointer-events:none;transform:translate(-50%,-50%);
  animation:focusAnim .6s ease-out forwards;
}
@keyframes focusAnim{
  0%{opacity:1;transform:translate(-50%,-50%) scale(1.4);}
  100%{opacity:0;transform:translate(-50%,-50%) scale(1);}
}

/* Log */
.log-row{
  display:flex;justify-content:space-between;align-items:flex-start;
  padding:11px 0;border-bottom:1px solid var(--line);font-size:13px;gap:8px;
}
.log-row .tag{font-size:10px;font-weight:800;padding:3px 8px;border-radius:999px;margin-right:6px;white-space:nowrap;}
.tag.in{background:rgba(95,191,127,.18);color:var(--ok);}
.tag.out{background:rgba(199,92,92,.18);color:var(--danger);}
.log-sub{font-size:11px;color:var(--text-dim);margin-top:2px;}
.log-time{color:var(--text-dim);font-size:11px;white-space:nowrap;}

.toast{
  position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(20px);
  background:var(--panel-2);border:1px solid var(--gold);color:var(--text);
  padding:10px 18px;border-radius:999px;font-size:13px;font-weight:700;
  opacity:0;transition:.25s;z-index:60;pointer-events:none;white-space:nowrap;max-width:90vw;
  text-overflow:ellipsis;overflow:hidden;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

nav.tabbar{
  position:fixed;bottom:0;left:0;right:0;background:var(--panel);
  border-top:1px solid var(--line);display:flex;z-index:30;
  padding-bottom:env(safe-area-inset-bottom);
}
nav.tabbar button{
  flex:1;padding:12px 0 10px;background:none;border:none;color:var(--text-dim);
  display:flex;flex-direction:column;align-items:center;gap:4px;font-size:11px;cursor:pointer;
}
nav.tabbar button.active{color:var(--gold-bright);}
</style>
</head>
<body>

<header class="app">
  <div>
    <div class="eyebrow">Duel Stock</div>
    <h1 class="cinzel">카드 재고</h1>
  </div>
  <div class="mode-toggle">
    <button id="modeInBtn" class="active in">입고</button>
    <button id="modeOutBtn" class="out">출고</button>
  </div>
</header>

<main>
  <section class="screen active" id="screen-cam">
    <div class="cam-wrap" id="camWrap">
      <video id="video" playsinline muted></video>
      <canvas id="shot"></canvas>
      <canvas id="ocr-preview"></canvas>
      <div class="guide"><div class="guide-box" id="guideBox"></div></div>
      <div class="progress-ring" id="ring"></div>
      <div class="ocr-status" id="ocrStatus"></div>
      <div class="cam-status" id="camStatus">카메라를 시작해줘</div>
      <div id="resDebug" style="position:absolute;top:6px;left:8px;font-size:10px;color:var(--gold-bright);background:rgba(0,0,0,.55);padding:2px 7px;border-radius:4px;pointer-events:none;"></div>
    </div>
    <div class="cooldown-bar" id="cooldownBar"><div class="cooldown-fill" id="cooldownFill"></div></div>
    <div id="zoomWrap" style="display:none;align-items:center;gap:10px;margin-top:10px;">
      <span style="font-size:12px;color:var(--text-dim);white-space:nowrap">🔍 줌</span>
      <input type="range" id="zoomSlider" style="flex:1;accent-color:var(--gold-bright);">
      <span id="zoomLabel" style="font-size:12px;color:var(--gold-bright);font-weight:700;min-width:32px;">2x</span>
    </div>
    <div class="cam-tip">
      카드를 가이드 박스에 맞추고 <b>하단 카드번호가 잘 보이게</b> 비춰줘.<br>
      가만히 있으면 자동으로 인식돼. 촬영된 이미지는 저장되지 않아.
    </div>
    <button class="cam-start" id="camStartBtn">카메라 시작</button>
  </section>

  <section class="screen" id="screen-search">
    <div class="search-bar">
      <input type="text" id="searchInput" placeholder="카드명으로 검색...">
    </div>
    <div id="searchResults"></div>
  </section>

  <section class="screen" id="screen-log">
    <div id="logList"></div>
  </section>
</main>

<div class="overlay" id="overlay">
  <div class="sheet">
    <div class="sheet-head">
      <div id="modalImgWrap"></div>
      <div>
        <div class="name" id="modalName">-</div>
        <div class="meta" id="modalMeta">-</div>
        <div class="meta" id="modalMode" style="margin-top:4px;color:var(--gold-bright);">입고 처리</div>
      </div>
    </div>

    <div class="field-label">일러스트 / 인쇄판 선택</div>
    <div class="illust-grid" id="illustGrid"></div>

    <div class="field-label">레어도</div>
    <select class="rarity" id="raritySelect"></select>

    <div class="field-label">매수</div>
    <div class="stepper">
      <button id="qtyMinus">−</button>
      <div class="qty" id="qtyVal">1</div>
      <button id="qtyPlus">+</button>
    </div>

    <div class="sheet-actions">
      <button class="btn-cancel" id="cancelBtn">취소</button>
      <button class="btn-confirm" id="confirmBtn">저장</button>
    </div>
  </div>
</div>

<div class="overlay" id="manualOverlay">
  <div class="sheet">
    <div style="font-size:15px;font-weight:800;color:var(--gold-bright);margin-bottom:4px;">카드 직접 등록</div>
    <div style="font-size:12px;color:var(--text-dim);margin-bottom:16px;">
      두 DB에서 찾지 못했어. 카드 정보를 직접 입력하면 앱에 저장돼서 다음엔 바로 인식돼.
    </div>

    <div class="field-label">인식된 카드번호</div>
    <div id="manualCodeLabel" style="font-size:14px;font-weight:700;color:var(--gold-bright);margin-bottom:14px;padding:10px 12px;background:var(--panel-2);border-radius:8px;border:1px solid var(--line);"></div>

    <div class="field-label">카드명</div>
    <input class="manual-input" id="manualCardName" placeholder="예: 블랙 매지션" type="text">

    <div class="field-label">인쇄판 라벨</div>
    <input class="manual-input" id="manualIllustLabel" placeholder="예: 쿼터센츄리 아트컬렉션 (QCAC-KR)">

    <div class="field-label">레어도 <span style="font-size:10px;color:var(--text-dim);font-weight:400">(쉼표로 구분)</span></div>
    <input class="manual-input" id="manualRarities" placeholder="예: 울트라레어, 시크릿레어, 쿼터센츄리 시크릿레어">

    <div class="sheet-actions">
      <button class="btn-cancel" id="manualCancelBtn">취소</button>
      <button class="btn-confirm in" id="manualSaveBtn">등록 후 입출고</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<nav class="tabbar">
  <button class="tab-btn active" data-screen="cam">📷 인식</button>
  <button class="tab-btn" data-screen="search">🔍 검색</button>
  <button class="tab-btn" data-screen="log">🧾 로그</button>
</nav>

<script>
/* ==========================================================================
   DB 레이어 (localStorage → Firestore로 교체 시 이 블록만 수정)
   재고 키: `{printId}||{rarity}`
   ========================================================================== */
const DB = {
  INV:'ocg_inventory', TX:'ocg_transactions',
  read(k,fb){try{return JSON.parse(localStorage.getItem(k))??fb;}catch(e){return fb;}},
  write(k,v){localStorage.setItem(k,JSON.stringify(v));},
  getInventory(){return this.read(this.INV,{});},
  getTx(){return this.read(this.TX,[]);},
  getStock(printId,rarity){
    return this.getInventory()[printId+'||'+rarity]?.quantity||0;
  },
  upsertInventory(cardName,printId,illustLabel,rarity,delta){
    const inv=this.getInventory();
    const key=printId+'||'+rarity;
    const prev=inv[key]?.quantity||0;
    const next=Math.max(0,prev+delta);
    inv[key]={cardName,printId,illustLabel,rarity,quantity:next,updatedAt:Date.now()};
    this.write(this.INV,inv);
    return next;
  },
  addTx(entry){
    const tx=this.getTx();
    tx.unshift(entry);
    this.write(this.TX,tx.slice(0,300));
  },

  // 수동 등록 커스텀 카드 (YGOPRODECK/Yugipedia 둘 다 없는 경우)
  CUSTOM_KEY:'ocg_custom_cards',
  getCustomCards(){ return this.read(this.CUSTOM_KEY,{}); },
  saveCustomCard(printId, entry){
    const c=this.getCustomCards();
    c[printId]=entry;
    this.write(this.CUSTOM_KEY,c);
  },
  findCustomByCode(code){
    const c=this.getCustomCards();
    return c[code]||null;
  }
};

/* ==========================================================================
   YGOPRODECK API
   ========================================================================== */
const API = 'https://db.ygoprodeck.com/api/v7/cardinfo.php';

// 카드번호(set code)로 조회 → 인쇄판+일러스트 정보 포함
async function fetchByCode(code){
  const url = `${API}?cardsetcode=${encodeURIComponent(code)}&language=ko`;
  const res = await fetch(url);
  if(!res.ok) return null;
  const data = await res.json();
  return data.data?.[0] || null;
}

// 카드명으로 검색 (검색 화면용)
async function searchByName(name){
  const url = `${API}?fname=${encodeURIComponent(name)}&language=ko`;
  const res = await fetch(url);
  if(!res.ok) return [];
  const data = await res.json();
  return data.data || [];
}

// API 응답에서 인쇄판 목록 추출
function parsePrints(card){
  if(!card.card_sets) return [{
    printId:'UNKNOWN', illustLabel:'알 수 없음', rarities:['노멀'], imageUrl:card.card_images?.[0]?.image_url
  }];

  // 이미지 매핑 — card_images 배열이 일러스트 순서대로 들어있음
  const images = card.card_images || [];

  // card_sets 중복 제거 후 인쇄판으로 변환
  const seen = new Set();
  const prints = [];
  card.card_sets.forEach(s=>{
    const key = s.set_code;
    if(seen.has(key)) return;
    seen.add(key);
    // 이미지 — 같은 카드 내 여러 일러스트는 images 배열 순서로 대응
    const imgIdx = prints.length < images.length ? prints.length : 0;
    prints.push({
      printId: s.set_code,
      illustLabel: `${s.set_name} (${s.set_code})`,
      rarities: collectRarities(card.card_sets, s.set_code),
      imageUrl: images[imgIdx]?.image_url_small || images[0]?.image_url_small
    });
  });
  return prints;
}

function collectRarities(sets, code){
  const r=[];
  sets.forEach(s=>{ if(s.set_code===code&&!r.includes(s.set_rarity)) r.push(s.set_rarity); });
  return r.length ? r : ['Normal'];
}

/* ==========================================================================
   Yugipedia API (YGOPRODECK 폴백)
   MediaWiki SMW ask → 카드번호로 카드명/타입 조회
   ========================================================================== */
async function fetchFromYugipedia(code){
  try{
    // 1차: SMW ask — 카드번호 직접 조회
    const askUrl='https://yugipedia.com/api.php?action=ask&format=json&origin=*&query='+
      encodeURIComponent(`[[Card number::${code}]]|?English name|?Korean name|?Card type|?Primary type`);
    const askRes=await fetch(askUrl,{signal:AbortSignal.timeout(7000)});
    if(askRes.ok){
      const d=await askRes.json();
      const items=Object.values(d?.query?.results||{});
      if(items.length){
        const p=items[0].printouts||{};
        const name=p['Korean name']?.[0]||p['English name']?.[0];
        if(name){
          const type=p['Primary type']?.[0]?.fulltext||p['Card type']?.[0]?.fulltext||'';
          return buildYugipediaCard(name,type,code);
        }
      }
    }

    // 2차: 텍스트 검색 → 카드 페이지 SMW 조회
    const srUrl='https://yugipedia.com/api.php?action=query&list=search&srsearch='+
      encodeURIComponent(code)+'&srlimit=5&format=json&origin=*';
    const srRes=await fetch(srUrl,{signal:AbortSignal.timeout(7000)});
    if(srRes.ok){
      const sd=await srRes.json();
      const hits=sd?.query?.search||[];
      // 세트 목록 페이지 제외, 순수 카드 페이지 우선
      const cardHit=hits.find(h=>!h.title.includes(':'))||hits[0];
      if(cardHit&&!cardHit.title.startsWith('Set Card Lists')){
        const propUrl='https://yugipedia.com/api.php?action=ask&format=json&origin=*&query='+
          encodeURIComponent(`[[${cardHit.title}]]|?English name|?Korean name|?Card type|?Primary type`);
        const pRes=await fetch(propUrl,{signal:AbortSignal.timeout(7000)});
        if(pRes.ok){
          const pd=await pRes.json();
          const items=Object.values(pd?.query?.results||{});
          if(items.length){
            const p=items[0].printouts||{};
            const name=p['Korean name']?.[0]||p['English name']?.[0]||cardHit.title;
            const type=p['Primary type']?.[0]?.fulltext||'';
            return buildYugipediaCard(name,type,code);
          }
        }
        return buildYugipediaCard(cardHit.title,'',code);
      }
    }
    return null;
  }catch(e){
    console.warn('Yugipedia error:',e);
    return null;
  }
}

function buildYugipediaCard(name,type,code){
  // QCAC-KR001 → 세트명 추출
  const setLabel=code.replace(/-[A-Z]{0,2}\d+$/,'')||code;
  return {
    name, type, fromYugipedia:true,
    card_sets:[{set_code:code, set_name:`(Yugipedia) ${setLabel}`, set_rarity:'Ultra Rare'}],
    card_images:[]
  };
}

// 커스텀 카드(수동 등록)를 openSheet 호환 구조로 변환
function buildCustomCard(entry){
  return {
    name:entry.cardName, type:'',
    fromCustom:true,
    card_sets:[{set_code:entry.printId, set_name:entry.illustLabel, set_rarity:entry.rarities[0]}],
    card_images:[],
    _customRarities:entry.rarities
  };
}

/* ==========================================================================
   OCR 엔진 — Cloudflare Worker → Google Vision API
   카드 전체 이미지를 Worker로 전송, Vision이 텍스트 전체 추출
   카드명(한글)과 카드번호(영숫자) 동시 인식
   ========================================================================== */
const WORKER_URL = 'https://ocg-worker.angbeesh.workers.dev';
const CODE_REGEX = /[A-Z]{2,6}-[A-Z]{0,2}\d{2,4}/g;
const KO_NAME_LINES = /^[가-힣\s·\-]{2,20}$/;

async function runVisionOCR(canvas){
  setOcrStatus('Google Vision 분석 중...');
  // canvas → base64 (카드 전체 영역)
  const base64 = canvas.toDataURL('image/jpeg', 0.92).split(',')[1];

  const res = await fetch(WORKER_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ image: base64 }),
    signal: AbortSignal.timeout(12000)
  });

  if(!res.ok) throw new Error('Worker 응답 오류: ' + res.status);
  const { text } = await res.json();
  setOcrStatus('');
  if(!text) return { code: null, name: null };

  // 카드번호 추출
  const clean = text.replace(/\s/g, '');
  const codes = clean.match(CODE_REGEX);
  const code = codes ? codes[0] : null;

  // 카드명 추출 — 한글 2글자 이상인 줄 중 첫 번째
  const lines = text.split('\n').map(l => l.trim()).filter(Boolean);
  const nameLine = lines.find(l => KO_NAME_LINES.test(l)) || null;

  return { code, name: nameLine };
}

/* ==========================================================================
   카메라 / 자동인식 (프레임 안정 → OCR → API)
   ========================================================================== */
let detecting=false, stableCount=0, lastFrameData=null;
let overlayOpen=false, cooldown=false;
let _videoTrack=null, _imageCapture=null; // grabFrame용 전역 트랙
const STABLE_THRESHOLD=7, DIFF_TOL=8;

const video = document.getElementById('video');
const shotCanvas = document.getElementById('shot');
const ocrCanvas = document.getElementById('ocr-preview');
const guideBox = document.getElementById('guideBox');
const camStatus = document.getElementById('camStatus');
const ring = document.getElementById('ring');
const ocrStatusEl = document.getElementById('ocrStatus');
const cooldownBar = document.getElementById('cooldownBar');

function showFocusRing(x, y){
  const wrap = document.getElementById('camWrap');
  const ring = document.createElement('div');
  ring.className = 'focus-ring';
  ring.style.left = x + 'px';
  ring.style.top  = y + 'px';
  wrap.appendChild(ring);
  setTimeout(() => ring.remove(), 650);
}

function setOcrStatus(msg){
  if(msg){ ocrStatusEl.textContent=msg; ocrStatusEl.classList.add('show'); }
  else ocrStatusEl.classList.remove('show');
}

document.getElementById('camStartBtn').addEventListener('click', async ()=>{
  document.getElementById('camStartBtn').disabled = true;
  document.getElementById('camStartBtn').textContent = '카메라 시작 중...';
  try{
    // 사용 가능한 카메라 목록에서 후면 카메라 deviceId 직접 가져오기
    // (facingMode만으론 저화질 카메라가 선택될 수 있음)
    const stream = await navigator.mediaDevices.getUserMedia({
      video:{
        facingMode: { exact: 'environment' },
        width:{ ideal:3840 }, height:{ ideal:2160 },
      },
      audio:false
    });
    video.srcObject = stream;
    await video.play();

    // 실제 해상도 확인 (디버그)
    const settings = stream.getVideoTracks()[0].getSettings();
    const resInfo = `${settings.width}×${settings.height}`;
    document.getElementById('resDebug').textContent = `📐 ${resInfo}`;

    // 트랙 직접 제어 — 초점 + 줌
    const track = stream.getVideoTracks()[0];
    _videoTrack = track;
    // ImageCapture — grabFrame()으로 네이티브 해상도 프레임 직접 캡처
    if(typeof ImageCapture !== 'undefined'){
      _imageCapture = new ImageCapture(track);
    }
    const caps = track.getCapabilities?.() || {};

    if(caps.focusMode?.includes('continuous')){
      await track.applyConstraints({ advanced:[{focusMode:'continuous'}] });
    }

    // 디지털 줌 지원 시 슬라이더 표시
    if(caps.zoom){
      const zoomWrap = document.getElementById('zoomWrap');
      const zoomSlider = document.getElementById('zoomSlider');
      const zoomLabel = document.getElementById('zoomLabel');
      zoomWrap.style.display = 'flex';
      zoomSlider.min = caps.zoom.min;
      zoomSlider.max = Math.min(caps.zoom.max, 8);
      zoomSlider.step = caps.zoom.step || 0.1;
      const defaultZoom = Math.min(caps.zoom.max, Math.max(caps.zoom.min, 2));
      zoomSlider.value = defaultZoom;
      zoomLabel.textContent = defaultZoom.toFixed(1) + 'x';
      // 초점+줌 함께 적용 (별도 호출하면 초점 설정이 덮어씌워짐)
      await track.applyConstraints({ advanced:[
        {focusMode:'continuous', zoom: defaultZoom}
      ]});

      zoomSlider.addEventListener('input', async ()=>{
        const z = parseFloat(zoomSlider.value);
        zoomLabel.textContent = z.toFixed(1) + 'x';
        await track.applyConstraints({ advanced:[
          {focusMode:'continuous', zoom: z}
        ]});
      });
    }

    // 3초마다 continuous autofocus 재트리거 (일부 Android 필요)
    setInterval(async ()=>{
      if(!_videoTrack) return;
      try{
        await _videoTrack.applyConstraints({ advanced:[{focusMode:'single-shot'}] });
        await _videoTrack.applyConstraints({ advanced:[{focusMode:'continuous'}] });
      }catch(e){}
    }, 3000);

    // 탭투포커스 — 탭한 위치로 초점 이동
    document.getElementById('camWrap').addEventListener('click', async (e)=>{
      if(!_videoTrack) return;
      const rect = e.currentTarget.getBoundingClientRect();
      const x = (e.clientX - rect.left) / rect.width;
      const y = (e.clientY - rect.top)  / rect.height;
      try{
        await _videoTrack.applyConstraints({ advanced:[
          {pointOfInterest:{x, y}, focusMode:'single-shot'}
        ]});
        // 0.8초 후 continuous로 복귀
        setTimeout(async ()=>{
          try{ await _videoTrack.applyConstraints({ advanced:[{focusMode:'continuous'}] }); }catch(e){}
        }, 800);
        // 탭 위치에 포커스 링 표시
        showFocusRing(e.clientX - rect.left, e.clientY - rect.top);
      }catch(e){}
    });
    document.getElementById('camStartBtn').style.display='none';
    camStatus.textContent='카드 하단 카드번호가 보이게 비춰줘';
    detecting=true;
    requestAnimationFrame(detectLoop);
  }catch(err){
    camStatus.textContent='카메라 권한이 필요해 ('+err.message+')';
    document.getElementById('camStartBtn').disabled=false;
    document.getElementById('camStartBtn').textContent='카메라 시작';
  }
});

let lastTick=0;
function detectLoop(ts){
  if(!detecting) return;
  if(ts-lastTick>300){lastTick=ts;checkFrame();}
  requestAnimationFrame(detectLoop);
}

function checkFrame(){
  if(video.readyState<2||overlayOpen||cooldown) return;
  const ctx=shotCanvas.getContext('2d',{willReadFrequently:true});
  const W=120,H=Math.round(120/0.685);
  shotCanvas.width=W;shotCanvas.height=H;
  ctx.drawImage(video,0,0,W,H);
  const frame=ctx.getImageData(0,0,W,H).data;

  if(lastFrameData){
    let diff=0;
    for(let i=0;i<frame.length;i+=4) diff+=Math.abs(frame[i]-lastFrameData[i]);
    const avg=diff/(frame.length/4);
    if(avg<DIFF_TOL){
      stableCount++;
      guideBox.classList.add('stable');
      camStatus.textContent=`인식 준비 (${Math.min(stableCount,STABLE_THRESHOLD)}/${STABLE_THRESHOLD})`;
    }else{
      stableCount=0;
      guideBox.classList.remove('stable');
      camStatus.textContent='카드를 가이드에 맞추고 가만히 있어줘';
    }
    if(stableCount>=STABLE_THRESHOLD){stableCount=0;captureAndRecognize();}
  }
  lastFrameData=frame;
}

async function captureAndRecognize(){
  ring.classList.add('spin');
  camStatus.textContent='카드 인식 중...';
  cooldown=true;

  // ── 프레임 캡처 (네이티브 해상도) ──
  let bitmap = null;
  if(_imageCapture){
    try{ bitmap = await _imageCapture.grabFrame(); }
    catch(e){ bitmap = null; }
  }

  const srcW = bitmap ? bitmap.width  : video.videoWidth;
  const srcH = bitmap ? bitmap.height : video.videoHeight;
  const src  = bitmap || video;

  // 가이드박스 전체 영역 크롭 (카드 전체)
  const guideW = srcW * 0.70;
  const guideH = guideW / 0.685;
  const gx = (srcW - guideW) / 2;
  const gy = (srcH - guideH) / 2;

  const oc = document.createElement('canvas');
  oc.width  = Math.round(guideW);
  oc.height = Math.round(guideH);
  const octx = oc.getContext('2d');
  octx.drawImage(src, gx, gy, guideW, guideH, 0, 0, oc.width, oc.height);
  if(bitmap) bitmap.close();

  // 미리보기
  const pc = ocrCanvas.getContext('2d');
  ocrCanvas.width = oc.width; ocrCanvas.height = oc.height;
  pc.drawImage(oc, 0, 0);

  try{
    const { code, name } = await runVisionOCR(oc);
    ring.classList.remove('spin');

    // ── 카드번호로 조회 ──
    let cardData = null;
    if(code){
      camStatus.textContent = `카드번호: ${code} 조회 중...`;
      cardData = await fetchByCode(code);
      if(!cardData){
        setOcrStatus('YGOPRODECK 없음 → Yugipedia 조회 중...');
        cardData = await fetchFromYugipedia(code);
      }
    }

    // ── 카드명으로 조회 (카드번호 실패 시) ──
    if(!cardData && name){
      camStatus.textContent = `카드명: ${name} 검색 중...`;
      setOcrStatus(`"${name}" 검색 중...`);
      const results = await searchByName(name);
      if(results.length > 0) cardData = results[0];
    }

    // ── 로컬 커스텀 카드 ──
    if(!cardData && code){
      const custom = DB.findCustomByCode(code);
      if(custom) cardData = buildCustomCard(custom);
    }

    setOcrStatus('');

    if(!cardData){
      camStatus.textContent = '카드를 인식하지 못했어 — 다시 시도해줘';
      openManualSheet(code || '');
      return;
    }

    const prints = parsePrints(cardData);
    const detectedPrint = prints.find(p => p.printId === code) || prints[0];
    openSheet(cardData, prints, detectedPrint.printId);

  }catch(err){
    ring.classList.remove('spin');
    setOcrStatus('');
    showToast('오류: ' + err.message);
    startCooldown(1500);
  }
}

function startCooldown(ms){
  cooldownBar.classList.add('show');
  const fill=document.getElementById('cooldownFill');
  fill.style.animation='none';
  fill.offsetHeight; // reflow
  fill.style.animation=`cooldown ${ms}ms linear forwards`;
  setTimeout(()=>{cooldown=false;cooldownBar.classList.remove('show');},ms);
}

let mode='in';
document.getElementById('modeInBtn').addEventListener('click',()=>setMode('in'));
document.getElementById('modeOutBtn').addEventListener('click',()=>setMode('out'));
function setMode(m){
  mode=m;
  document.getElementById('modeInBtn').classList.toggle('active',m==='in');
  document.getElementById('modeOutBtn').classList.toggle('active',m==='out');
}

   모달
   ========================================================================== */
let currentCard=null,currentPrint=null,currentQty=1,currentPrints=[];

let _fromSearch=false;
function openSheet(card,prints,detectedPrintId,fromSearch=false){
  _fromSearch=fromSearch;
  currentCard=card; currentPrints=prints; currentQty=1;

  // 헤더 이미지
  const imgWrap=document.getElementById('modalImgWrap');
  const imgUrl=prints.find(p=>p.printId===detectedPrintId)?.imageUrl||prints[0]?.imageUrl;
  if(imgUrl){
    imgWrap.innerHTML=`<img class="card-img" src="${imgUrl}" alt="${card.name}">`;
  }else{
    imgWrap.innerHTML=`<div class="card-img-placeholder">${(card.name||'').slice(0,2)}</div>`;
  }

  document.getElementById('modalName').textContent=card.name||'Unknown';
  document.getElementById('modalMode').textContent=mode==='in'?'입고 처리':'출고 처리';
  document.getElementById('modalMeta').textContent=
    `${card.type||''} ${card.race||''}`.trim() +
    (prints.length>1?` · ${prints.length}가지 인쇄판`:'');
  document.getElementById('qtyVal').textContent=1;
  document.getElementById('confirmBtn').className='btn-confirm '+mode;
  document.getElementById('confirmBtn').textContent=mode==='in'?'입고 저장':'출고 저장';

  // 일러스트 그리드
  const grid=document.getElementById('illustGrid');
  grid.innerHTML='';
  prints.forEach(p=>{
    const div=document.createElement('div');
    div.className='illust-card'+(p.printId===detectedPrintId?' selected':'');
    div.innerHTML=p.imageUrl
      ?`<img src="${p.imageUrl}" alt="${p.printId}" loading="lazy"><div class="ic-code">${p.printId}</div>`
      :`<div class="ic-placeholder">${p.printId.split('-')[0]}</div><div class="ic-code">${p.printId}</div>`;
    div.addEventListener('click',()=>{
      grid.querySelectorAll('.illust-card').forEach(c=>c.classList.remove('selected'));
      div.classList.add('selected');
      selectPrint(p);
      // 메인 이미지도 교체
      if(p.imageUrl) imgWrap.innerHTML=`<img class="card-img" src="${p.imageUrl}" alt="">`;
    });
    grid.appendChild(div);
  });

  const matched=prints.find(p=>p.printId===detectedPrintId)||prints[0];
  selectPrint(matched);
  document.getElementById('overlay').classList.add('show');
  overlayOpen=true;
}

function selectPrint(p){
  currentPrint=p;
  const sel=document.getElementById('raritySelect');
  sel.innerHTML='';
  p.rarities.forEach(r=>{
    const o=document.createElement('option');
    const qty=DB.getStock(p.printId,r);
    o.value=r; o.textContent=`${r}  (현재 ${qty}장)`;
    sel.appendChild(o);
  });
}

function closeSheet(fromSearch=false){
  document.getElementById('overlay').classList.remove('show');
  overlayOpen=false; currentCard=null; currentPrint=null;
  if(!fromSearch) startCooldown(2500);
  // 검색 결과 재렌더 (재고 수량 업데이트 반영)
  if(fromSearch) doSearch();
}

document.getElementById('qtyPlus').addEventListener('click',()=>{
  currentQty++;document.getElementById('qtyVal').textContent=currentQty;
});
document.getElementById('qtyMinus').addEventListener('click',()=>{
  currentQty=Math.max(1,currentQty-1);document.getElementById('qtyVal').textContent=currentQty;
});
document.getElementById('cancelBtn').addEventListener('click',()=>closeSheet(_fromSearch));

document.getElementById('confirmBtn').addEventListener('click',()=>{
  if(!currentCard||!currentPrint) return;
  const rarity=document.getElementById('raritySelect').value;
  const delta=mode==='in'?currentQty:-currentQty;
  if(mode==='out'&&DB.getStock(currentPrint.printId,rarity)<currentQty){
    showToast('⚠ 재고가 부족해!');return;
  }
  const newQty=DB.upsertInventory(currentCard.name,currentPrint.printId,currentPrint.illustLabel,rarity,delta);
  DB.addTx({
    cardName:currentCard.name,printId:currentPrint.printId,
    illustLabel:currentPrint.illustLabel,rarity,
    type:mode,amount:currentQty,resultQty:newQty,timestamp:Date.now()
  });
  showToast(`${currentCard.name} [${currentPrint.printId}] ${rarity} ${mode==='in'?'+':'-'}${currentQty}장 → ${newQty}장`);
  closeSheet(_fromSearch);renderLog();
});

/* ==========================================================================
   검색 (YGOPRODECK API)
   ========================================================================== */
let searchTimer=null;
document.getElementById('searchInput').addEventListener('input',()=>{
  clearTimeout(searchTimer);
  searchTimer=setTimeout(doSearch,400);
});

async function doSearch(){
  const q=document.getElementById('searchInput').value.trim();
  const el=document.getElementById('searchResults');
  if(!q){el.innerHTML='';return;}
  el.innerHTML='<div class="empty">검색 중...</div>';
  try{
    const cards=await searchByName(q);
    renderSearchResults(cards);
  }catch(e){
    el.innerHTML='<div class="empty">검색 오류 — 네트워크를 확인해줘</div>';
  }
}

const _searchCardMap = {};
function renderSearchResults(cards){
  const inv=DB.getInventory();
  const el=document.getElementById('searchResults');
  if(!cards.length){el.innerHTML='<div class="empty">검색 결과가 없어</div>';return;}
  Object.keys(_searchCardMap).forEach(k=>delete _searchCardMap[k]);
  el.innerHTML=cards.slice(0,30).map((card,ci)=>{
    const prints=parsePrints(card);
    _searchCardMap[ci]={card,prints};
    const mainImg=card.card_images?.[0]?.image_url_small||'';
    const printRows=prints.map((p,pi)=>{
      const badges=p.rarities.map(r=>{
        const qty=inv[p.printId+'||'+r]?.quantity||0;
        return `<span class="rarity-badge ${qty===0?'zero':''}">${r}<span class="bqty">${qty}장</span></span>`;
      }).join('');
      const thumb=p.imageUrl?`<img class="print-thumb" src="${p.imageUrl}" loading="lazy">`
        :`<div class="print-thumb" style="background:linear-gradient(155deg,var(--violet),#2a2150)"></div>`;
      return `<div class="print-row">
        ${thumb}
        <div class="print-info">
          <div class="print-code">${p.printId}</div>
          <div class="print-illust">${p.illustLabel}</div>
          <div class="rarity-badges">${badges}</div>
        </div>
        <div style="display:flex;flex-direction:column;gap:5px;flex-shrink:0">
          <button class="sb-btn sb-in" data-ci="${ci}" data-pi="${pi}">＋입고</button>
          <button class="sb-btn sb-out" data-ci="${ci}" data-pi="${pi}">－출고</button>
        </div>
      </div>`;
    }).join('');
    return `<div class="card-group">
      <div class="group-header">
        ${mainImg?`<img src="${mainImg}" alt="${card.name}">`:''}
        <div>
          <div class="group-name">${card.name}</div>
          <div style="font-size:11px;color:var(--text-dim)">${card.type||''} · ${prints.length}가지 인쇄판</div>
        </div>
      </div>${printRows}</div>`;
  }).join('');
  el.querySelectorAll('.sb-btn').forEach(btn=>{
    btn.addEventListener('click',()=>{
      const {ci,pi}=btn.dataset;
      const {card,prints}=_searchCardMap[ci];
      setMode(btn.classList.contains('sb-in')?'in':'out');
      openSheet(card,prints,prints[pi].printId,true);
    });
  });
}

/* ==========================================================================
   로그
   ========================================================================== */
function renderLog(){
  const tx=DB.getTx();
  const el=document.getElementById('logList');
  if(!tx.length){el.innerHTML='<div class="empty">아직 거래 기록이 없어</div>';return;}
  el.innerHTML=tx.map(t=>{
    const time=new Date(t.timestamp).toLocaleString('ko-KR',{month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'});
    return `<div class="log-row">
      <div>
        <span class="tag ${t.type}">${t.type==='in'?'입고':'출고'}</span>${t.cardName} ${t.amount}장
        <div class="log-sub">${t.printId} · ${t.rarity} → 잔여 ${t.resultQty}장</div>
      </div>
      <div class="log-time">${time}</div>
    </div>`;
  }).join('');
}

/* ==========================================================================
   수동 등록 시트
   ========================================================================== */
let _manualCode='';
const manualOverlay=document.getElementById('manualOverlay');

function openManualSheet(code){
  _manualCode=code;
  document.getElementById('manualCodeLabel').textContent=code;
  document.getElementById('manualCardName').value='';
  document.getElementById('manualIllustLabel').value=code.replace(/-[A-Z]{0,2}\d+$/,'')||code;
  document.getElementById('manualRarities').value='울트라레어';
  manualOverlay.classList.add('show');
  overlayOpen=true;
  setTimeout(()=>document.getElementById('manualCardName').focus(),300);
}

function closeManualSheet(){
  manualOverlay.classList.remove('show');
  overlayOpen=false;
  startCooldown(1500);
}

document.getElementById('manualCancelBtn').addEventListener('click', closeManualSheet);

document.getElementById('manualSaveBtn').addEventListener('click',()=>{
  const cardName=document.getElementById('manualCardName').value.trim();
  const illustLabel=document.getElementById('manualIllustLabel').value.trim();
  const raritiesRaw=document.getElementById('manualRarities').value.trim();
  if(!cardName){ showToast('카드명을 입력해줘'); return; }

  const rarities=raritiesRaw.split(',').map(r=>r.trim()).filter(Boolean);
  if(!rarities.length){ showToast('레어도를 입력해줘'); return; }

  // 커스텀 카드 저장
  const entry={ cardName, printId:_manualCode, illustLabel:illustLabel||_manualCode, rarities };
  DB.saveCustomCard(_manualCode, entry);

  // 바로 입출고 모달로 연결
  manualOverlay.classList.remove('show');
  const cardObj=buildCustomCard(entry);
  const prints=parsePrints(cardObj);
  // 커스텀 카드는 수동 입력한 레어도 사용
  prints[0].rarities=rarities;
  openSheet(cardObj, prints, _manualCode);
  showToast(`"${cardName}" 등록 완료 — 다음부터는 자동으로 인식돼`);
});

/* ==========================================================================
   탭 / 토스트
   ========================================================================== */
document.querySelectorAll('.tab-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
    document.getElementById('screen-'+btn.dataset.screen).classList.add('active');
    if(btn.dataset.screen==='log') renderLog();
  });
});

const toastEl=document.getElementById('toast');
let toastTimer=null;
function showToast(msg){
  toastEl.textContent=msg;toastEl.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>toastEl.classList.remove('show'),2600);
}

renderLog();
</script>
