<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>유희왕 음성 재고 관리</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #18212f;
      --muted: #667085;
      --line: #d7dee9;
      --panel: #ffffff;
      --soft: #f5f7fb;
      --brand: #2563eb;
      --brand-dark: #1d4ed8;
      --green: #178a54;
      --red: #c2413b;
      --gold: #b58117;
      --shadow: 0 18px 45px rgba(24, 33, 47, .12);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--ink);
      background:
        linear-gradient(180deg, rgba(255,255,255,.9), rgba(245,247,251,.96)),
        radial-gradient(circle at 15% 0%, rgba(37,99,235,.16), transparent 34%),
        radial-gradient(circle at 86% 12%, rgba(181,129,23,.13), transparent 30%),
        #f5f7fb;
      min-height: 100vh;
      letter-spacing: 0;
    }

    button, input, select, textarea {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
    }

    .app {
      width: min(1180px, calc(100% - 32px));
      margin: 0 auto;
      padding: 24px 0 40px;
    }

    header {
      display: flex;
      align-items: flex-end;
      justify-content: flex-start;
      gap: 18px;
      padding: 10px 0 22px;
    }

    h1 {
      margin: 0;
      font-size: clamp(28px, 4vw, 44px);
      line-height: 1.05;
      letter-spacing: 0;
    }

    .subtitle {
      margin: 10px 0 0;
      color: var(--muted);
      font-size: 15px;
    }

    main {
      display: grid;
      grid-template-columns: minmax(0, 1fr);
      gap: 18px;
      align-items: start;
    }

    .section {
      background: rgba(255,255,255,.9);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .section-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 16px;
      border-bottom: 1px solid var(--line);
      background: rgba(245,247,251,.72);
    }

    h2 {
      margin: 0;
      font-size: 17px;
      line-height: 1.2;
    }

    .body {
      padding: 16px;
    }

    .voice-pad {
      display: grid;
      grid-template-columns: 156px minmax(0, 1fr);
      gap: 16px;
      align-items: stretch;
    }

    .mic {
      min-height: 156px;
      border-radius: 8px;
      background: var(--brand);
      color: #fff;
      display: grid;
      place-items: center;
      box-shadow: inset 0 -16px 36px rgba(0,0,0,.14);
      transition: transform .12s ease, background .12s ease;
    }

    .mic:active {
      transform: translateY(1px);
    }

    .mic.listening {
      background: var(--red);
    }

    .mic-mark {
      display: grid;
      gap: 9px;
      place-items: center;
      font-weight: 800;
      letter-spacing: 0;
    }

    .mic-symbol {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      border: 3px solid currentColor;
      display: grid;
      place-items: center;
      font-size: 27px;
      line-height: 1;
    }

    textarea {
      width: 100%;
      min-height: 156px;
      resize: vertical;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 14px;
      color: var(--ink);
      background: #fff;
      outline: none;
    }

    textarea:focus, input:focus, select:focus {
      border-color: var(--brand);
      box-shadow: 0 0 0 3px rgba(37,99,235,.14);
    }

    .row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }

    .chip {
      border: 1px solid var(--line);
      background: #fff;
      color: var(--ink);
      border-radius: 999px;
      padding: 8px 10px;
      font-size: 13px;
      max-width: 100%;
    }

    .primary, .secondary, .danger {
      min-height: 40px;
      border-radius: 8px;
      padding: 0 14px;
      font-weight: 700;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      white-space: nowrap;
    }

    .primary {
      background: var(--brand);
      color: #fff;
    }

    .primary:hover {
      background: var(--brand-dark);
    }

    .secondary {
      background: #eef3fb;
      color: var(--ink);
      border: 1px solid var(--line);
    }

    .danger {
      background: #fff1f0;
      color: var(--red);
      border: 1px solid #f3c4c0;
    }

    .parse-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
      margin-top: 16px;
    }

    label {
      display: grid;
      gap: 7px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
    }

    input, select {
      width: 100%;
      min-height: 42px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      padding: 0 11px;
      color: var(--ink);
      outline: none;
    }

    .suggestions {
      margin-top: 10px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }

    .suggestion {
      border: 1px solid #c8d7f5;
      background: #f4f7ff;
      color: var(--brand-dark);
      border-radius: 999px;
      padding: 7px 10px;
      font-size: 13px;
    }

    .suggestion.best {
      background: #e9f8f0;
      color: var(--green);
      border-color: #a7dfbf;
    }

    .suggestion-label {
      width: 100%;
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
    }

    .inventory-tools {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 118px;
      gap: 8px;
    }

    .table-wrap {
      overflow: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 760px;
    }

    th, td {
      padding: 12px 10px;
      text-align: left;
      border-bottom: 1px solid var(--line);
      font-size: 14px;
      vertical-align: middle;
    }

    th {
      color: var(--muted);
      font-size: 12px;
      background: var(--soft);
      position: sticky;
      top: 0;
      z-index: 1;
    }

    .qty {
      width: 68px;
      font-weight: 800;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      min-height: 26px;
      border-radius: 999px;
      padding: 0 9px;
      background: #f4f7ff;
      color: var(--brand-dark);
      border: 1px solid #d9e4ff;
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
    }

    .badge.gold {
      background: #fff8e8;
      color: #7a520c;
      border-color: #f1d79b;
    }

    .empty {
      padding: 42px 16px;
      text-align: center;
      color: var(--muted);
    }

    .mini-actions {
      display: flex;
      gap: 6px;
      justify-content: flex-end;
    }

    .icon-btn {
      width: 34px;
      height: 34px;
      border-radius: 8px;
      border: 1px solid var(--line);
      background: #fff;
      color: var(--ink);
      display: inline-grid;
      place-items: center;
      font-weight: 900;
    }

    .status {
      margin-top: 12px;
      color: var(--muted);
      font-size: 13px;
      min-height: 19px;
    }

    @media (max-width: 920px) {
      header, main {
        display: grid;
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 620px) {
      .app {
        width: min(100% - 20px, 1180px);
        padding-top: 14px;
      }

      .voice-pad, .parse-grid, .inventory-tools {
        grid-template-columns: 1fr;
      }

      .mic {
        min-height: 112px;
      }

      .section-head {
        align-items: stretch;
        flex-direction: column;
      }

      .row {
        width: 100%;
      }

      .primary, .secondary, .danger {
        flex: 1 1 auto;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <div>
        <h1>음성인식 OCG 재고관리</h1>
        <p class="subtitle">카드명과 레어도를 말하면 재고 초안으로 변환합니다.</p>
      </div>
    </header>

    <main>
      <div class="section">
        <div class="section-head">
          <h2>음성 등록</h2>
        </div>
        <div class="body">
          <div class="voice-pad">
            <button class="mic" id="micBtn" type="button" aria-label="음성 입력 시작">
              <span class="mic-mark">
                <span class="mic-symbol">●</span>
                <span id="micLabel">말하기</span>
              </span>
            </button>
            <textarea id="transcript" placeholder="예: 푸른 눈의 백룡 시크릿 레어 세 장 추가"></textarea>
          </div>

          <div class="suggestions" id="suggestions"></div>

          <div class="parse-grid">
            <label>카드명
              <input id="cardName" list="cardNames" autocomplete="off">
              <datalist id="cardNames"></datalist>
            </label>
            <label>레어도
              <select id="rarity"></select>
            </label>
            <label>수량
              <input id="quantity" type="number" min="1" value="1">
            </label>
          </div>

          <!-- 숨김 처리 (파싱 로직 유지용) -->
          <select id="action" style="display:none">
            <option value="add">추가</option>
            <option value="remove">차감</option>
            <option value="sold">판매</option>
          </select>
          <select id="condition" style="display:none">
            <option value="NM">NM</option>
          </select>
          <select id="language" style="display:none">
            <option value="KR">한국어</option>
          </select>

          <div class="status" id="status"></div>

          <!-- 입출고 버튼 -->
          <div style="display:flex;gap:10px;margin-top:14px;">
            <button class="primary" id="addBtn" type="button" style="flex:1;background:var(--green);">＋ 입고</button>
            <button class="primary" id="removeBtn" type="button" style="flex:1;background:var(--red);">－ 출고</button>
          </div>
        </div>

        <div class="section-head">
          <h2>재고 목록</h2>
          <div class="inventory-tools">
            <input id="search" placeholder="검색">
            <button class="danger" id="clearBtn" type="button">초기화</button>
          </div>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>카드명</th>
                <th>레어도</th>
                <th>수량</th>
                <th>최근 변경</th>
                <th></th>
              </tr>
            </thead>
            <tbody id="inventoryBody"></tbody>
          </table>
          <div class="empty" id="empty">아직 등록된 카드가 없습니다.</div>
        </div>
      </div>

    </main>
  </div>

  <script>
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    const storageKey = "ygoVoiceInventory.v1";
    const YGO_API = "https://db.ygoprodeck.com/api/v7/cardinfo.php";

    // YGOPRODECK에서 카드명으로 인쇄판/레어도 조회
    async function fetchCardPrints(name) {
      try {
        const res = await fetch(`${YGO_API}?fname=${encodeURIComponent(name)}&language=ko`);
        if (!res.ok) return null;
        const data = await res.json();
        const card = data.data?.[0];
        if (!card || !card.card_sets) return null;

        // 레어도 중복 제거
        const rarities = [...new Set(card.card_sets.map(s => s.set_rarity))];
        const imageUrl = card.card_images?.[0]?.image_url_small || null;
        return { name: card.name, rarities, imageUrl, sets: card.card_sets };
      } catch(e) {
        return null;
      }
    }

    // 카드명 확정 시 YGOPRODECK에서 레어도 자동 조회
    async function updateRarityFromAPI(cardName) {
      if (!cardName) return;
      setStatus(`"${cardName}" 인쇄판 정보 조회 중...`);
      const result = await fetchCardPrints(cardName);
      if (result && result.rarities.length) {
        const sel = $("rarity");
        sel.innerHTML = "";
        result.rarities.forEach(r => {
          const opt = document.createElement("option");
          opt.value = r; opt.textContent = r;
          sel.appendChild(opt);
        });
        // 카드 이미지 표시
        if (result.imageUrl) {
          let img = $("cardPreviewImg");
          if (!img) {
            img = document.createElement("img");
            img.id = "cardPreviewImg";
            img.style.cssText = "width:72px;height:100px;object-fit:cover;border-radius:6px;border:1px solid var(--line);flex-shrink:0;";
            const pad = document.querySelector(".voice-pad");
            pad.insertBefore(img, pad.firstChild);
          }
          img.src = result.imageUrl;
          img.alt = cardName;
        }
        setStatus(`"${cardName}" — ${result.rarities.length}가지 레어도 로드됨. 맞으면 재고에 반영하세요.`);
      } else {
        // API에 없으면 기본 하드코딩 목록으로 폴백
        resetRarityOptions();
        setStatus(`"${cardName}" — DB에서 인쇄판 정보를 찾지 못했어. 레어도를 직접 선택해줘.`);

    }

      ["스프라이트 엘프", ["스프 엘프", "스프라이트엘프"]],
      ["라이트닝 스톰", ["라스톰", "라이트닝스톰"]],
      ["금지된 일적", ["일적", "금지 일적"]],
      ["삼전의 재", ["삼전재", "삼재"]],
      ["삼전의 호", ["삼전호", "삼호"]],
      ["길항승부", ["길항", "이븐리 매치드"]],
      ["인스펙트 보더", ["보더", "인스펙터 보더"]]
    ]);

    const rarityOptions = [
      "Common",
      "Rare",
      "Super Rare",
      "Ultra Rare",
      "Secret Rare",
      "Ultimate Rare",
      "Collector's Rare",
      "Prismatic Secret Rare",
      "Quarter Century Secret Rare",
      "Ghost Rare"
    ];

    const rarityAliases = [
      { value: "Quarter Century Secret Rare", words: ["쿼터 센추리", "쿼센", "쿼싴", "25싴", "25시크", "쿼터시크"] },
      { value: "Prismatic Secret Rare", words: ["프리즈마틱", "프싴", "프시크", "프리즈마틱 시크릿"] },
      { value: "Collector's Rare", words: ["컬렉터즈", "컬레", "컬렉터 레어"] },
      { value: "Ultimate Rare", words: ["얼티", "얼티밋", "얼티메이트"] },
      { value: "Secret Rare", words: ["시크릿", "시크", "싴", "시크릿 레어"] },
      { value: "Ultra Rare", words: ["울트라", "울레", "울트라 레어"] },
      { value: "Super Rare", words: ["슈퍼", "슈레", "슈퍼 레어"] },
      { value: "Ghost Rare", words: ["고스트", "고레", "고스트 레어"] },
      { value: "Rare", words: ["레어"] },
      { value: "Common", words: ["노멀", "노말", "커먼", "일반"] }
    ];

    const conditionAliases = [
      { value: "NM", words: ["니어민트", "민트", "엔엠", "nm"] },
      { value: "LP", words: ["라이트 플레이드", "라플", "엘피", "lp"] },
      { value: "MP", words: ["모더레이트", "엠피", "mp"] },
      { value: "HP", words: ["헤비 플레이드", "에이치피", "hp"] },
      { value: "DMG", words: ["데미지", "손상", "dmg"] }
    ];

    const actionAliases = [
      { value: "sold", words: ["판매", "팔림", "판매됨", "출고"] },
      { value: "remove", words: ["차감", "제거", "삭제", "빼", "뺌"] },
      { value: "add", words: ["추가", "입고", "등록", "넣어", "더해"] }
    ];

    const koreanNumbers = new Map([
      ["한", 1], ["하나", 1], ["일", 1],
      ["두", 2], ["둘", 2], ["이", 2],
      ["세", 3], ["셋", 3], ["삼", 3],
      ["네", 4], ["넷", 4], ["사", 4],
      ["다섯", 5], ["오", 5],
      ["여섯", 6], ["육", 6],
      ["일곱", 7], ["칠", 7],
      ["여덟", 8], ["팔", 8],
      ["아홉", 9], ["구", 9],
      ["열", 10], ["십", 10]
    ]);

    let recognition = null;
    let listening = false;
    let heardSpeech = false;
    let silenceTimer = null;
    let inventory = loadInventory();

    const $ = (id) => document.getElementById(id);

    function init() {
      resetRarityOptions();

      cards.forEach((card) => {
        const option = document.createElement("option");
        option.value = card;
        $("cardNames").appendChild(option);
      });

      $("micBtn").addEventListener("click", toggleMic);
      $("addBtn").addEventListener("click", () => { $("action").value = "add"; saveParsed(); });
      $("removeBtn").addEventListener("click", () => { $("action").value = "remove"; saveParsed(); });
      $("transcript").addEventListener("input", parseTranscript);
      $("search").addEventListener("input", renderInventory);
      $("clearBtn").addEventListener("click", clearInventory);
      $("cardName").addEventListener("input", () => {
        updateSuggestions();
        clearTimeout(window._cardNameTimer);
        window._cardNameTimer = setTimeout(() => {
          const name = $("cardName").value.trim();
          if (name) updateRarityFromAPI(name);
        }, 600);
      });

      setupSpeech();
      renderInventory();
      updateSuggestions();
    }

    function setupSpeech() {
      if (!SpeechRecognition) {
        setStatus("이 브라우저는 음성 인식을 지원하지 않습니다. 문장을 직접 입력해도 파싱할 수 있습니다.");
        return;
      }

      recognition = new SpeechRecognition();
      recognition.lang = "ko-KR";
      recognition.interimResults = true;
      recognition.continuous = false;
      recognition.maxAlternatives = 3;

      recognition.onstart = () => {
        listening = true;
        heardSpeech = false;
        $("micBtn").classList.add("listening");
        $("micLabel").textContent = "듣는 중";
        setStatus("듣고 있습니다. 말이 끝나면 자동으로 해석합니다.");
        clearTimeout(silenceTimer);
        silenceTimer = setTimeout(() => {
          if (listening && !heardSpeech) {
            setStatus("아직 음성이 감지되지 않았습니다. 마이크 권한, 입력 장치, 브라우저 음성 인식 지원을 확인해주세요.");
          }
        }, 4500);
      };

      recognition.onaudiostart = () => {
        setStatus("마이크 입력을 받는 중입니다.");
      };

      recognition.onspeechstart = () => {
        heardSpeech = true;
        setStatus("음성을 감지했습니다.");
      };

      recognition.onresult = (event) => {
        let text = "";
        for (let i = 0; i < event.results.length; i += 1) {
          text += event.results[i][0].transcript;
        }
        const nextText = text.trim();
        if (nextText) {
          $("transcript").value = nextText;
          parseTranscript();
        }
      };

      recognition.onnomatch = () => {
        setStatus("음성을 들었지만 문장으로 변환하지 못했습니다. 조금 더 천천히 말하거나 직접 입력해보세요.");
      };

      recognition.onerror = (event) => {
        listening = false;
        clearTimeout(silenceTimer);
        $("micBtn").classList.remove("listening");
        $("micLabel").textContent = "말하기";
        setStatus(speechErrorMessage(event.error));
      };

      recognition.onend = () => {
        listening = false;
        clearTimeout(silenceTimer);
        $("micBtn").classList.remove("listening");
        $("micLabel").textContent = "말하기";
        if ($("transcript").value.trim()) {
          parseTranscript();
        } else if (!heardSpeech) {
          setStatus("음성 입력이 비어 있습니다. 다시 말하기를 누르거나 문장을 직접 입력해주세요.");
        }
      };
    }

    function toggleMic() {
      if (!recognition) {
        setStatus("마이크 대신 문장을 입력하면 자동으로 분석됩니다.");
        return;
      }

      if (listening) {
        recognition.stop();
      } else {
        try {
          recognition.start();
        } catch (error) {
          setStatus("음성 인식이 이미 시작 중입니다. 잠시 후 다시 눌러주세요.");
        }
      }
    }

    function speechErrorMessage(error) {
      const messages = {
        "not-allowed": "마이크 권한이 차단되었습니다. 브라우저 주소창의 권한 설정에서 마이크를 허용해주세요.",
        "service-not-allowed": "이 브라우저 또는 환경에서 음성 인식 서비스가 차단되었습니다. Chrome 또는 Edge의 HTTPS 페이지에서 다시 시도해주세요.",
        "no-speech": "음성이 감지되지 않았습니다. 마이크 가까이에서 다시 말해보세요.",
        "audio-capture": "마이크 입력 장치를 찾지 못했습니다. 기기의 마이크 설정을 확인해주세요.",
        "network": "브라우저 음성 인식 서비스 연결에 실패했습니다. 네트워크 상태를 확인하거나 직접 입력을 사용해주세요.",
        "aborted": "음성 인식이 중단되었습니다. 다시 말하기를 눌러주세요."
      };
      return messages[error] || `음성 인식 오류: ${error}`;
    }

    function normalize(text) {
      return text.toLowerCase().replace(/\s+/g, " ").trim();
    }

    function normalizeCardText(text) {
      return normalize(text)
        .replace(/&/g, "앤")
        .replace(/[^\u3131-\u318e\uac00-\ud7a3a-z0-9]/g, "")
        .replace(/드래곤/g, "드레곤")
        .replace(/매지션/g, "메지션")
        .replace(/블랙/g, "블렉")
        .replace(/크샤트리라/g, "크샤")
        .replace(/티아라멘츠/g, "티아라")
        .replace(/스프라이트/g, "스프")
        .replace(/증식의지/g, "증식의g")
        .replace(/증식지/g, "증식의g")
        .replace(/증지/g, "증식의g")
        .replace(/지$/g, "g");
    }

    function stripCommandWords(text) {
      const removals = [
        ...rarityAliases.flatMap((item) => item.words),
        ...conditionAliases.flatMap((item) => item.words),
        ...actionAliases.flatMap((item) => item.words),
        "레어", "한국어", "일본어", "영어", "카드", "좀", "으로"
      ];

      let cleaned = text
        .replace(/\d+\s*(장|개|매)/g, "")
        .replace(/[한하나일두둘이세셋삼네넷사다섯오여섯육일곱칠여덟팔아홉구열십]+\s*(장|개|매)/g, "")
        .trim();

      for (const word of removals) {
        cleaned = cleaned.replace(new RegExp(escapeRegExp(word), "gi"), "");
      }

      return cleaned.replace(/\s+/g, " ").trim();
    }

    function parseTranscript() {
      const text = $("transcript").value.trim();
      const normalized = normalize(text);
      if (!text) {
        setStatus("등록할 문장을 말하거나 입력해주세요.");
        return;
      }

      const rarity = findAlias(normalized, rarityAliases) || "Common";
      const condition = findAlias(normalized, conditionAliases) || "NM";
      const action = findAlias(normalized, actionAliases) || "add";
      const quantity = findQuantity(normalized);
      const candidates = suggestCards(text, 5);
      const cardName = findCardName(text, normalized, candidates);

      $("rarity").value = rarity;
      $("condition").value = condition;
      $("action").value = action;
      $("quantity").value = quantity;
      $("cardName").value = cardName;

      updateSuggestions(candidates);

      if (cardName) {
        updateRarityFromAPI(cardName);
      } else {
        setStatus("카드명을 찾지 못했습니다. 아래 후보를 선택하거나 카드명을 직접 입력하세요.");
      }
    }

    function findAlias(text, groups) {
      for (const group of groups) {
        if (group.words.some((word) => text.includes(word.toLowerCase()))) {
          return group.value;
        }
      }
      return "";
    }

    function findQuantity(text) {
      const digitMatch = text.match(/(\d+)\s*(장|개|매)?/);
      if (digitMatch) {
        return Math.max(1, Number(digitMatch[1]));
      }

      for (const [word, number] of koreanNumbers) {
        const pattern = new RegExp(`${word}\\s*(장|개|매)?`);
        if (pattern.test(text)) {
          return number;
        }
      }

      return 1;
    }

    function findCardName(rawText, normalized, candidates = []) {
      const direct = cards.find((card) => normalized.includes(normalize(card)));
      if (direct) {
        return direct;
      }

      const compactText = normalized.replace(/\s/g, "");
      const compact = cards.find((card) => compactText.includes(normalize(card).replace(/\s/g, "")));
      if (compact) {
        return compact;
      }

      for (const [card, aliases] of cardAliases) {
        if (aliases.some((alias) => normalizeCardText(rawText).includes(normalizeCardText(alias)))) {
          return card;
        }
      }

      if (candidates.length && candidates[0].score >= 42) {
        return candidates[0].card;
      }

      return stripCommandWords(rawText);
    }

    function updateSuggestions(precomputed = null) {
      const input = $("cardName").value.trim() || $("transcript").value.trim();
      const matches = precomputed || suggestCards(input, 6);
      $("suggestions").innerHTML = [
        `<div class="suggestion-label">비슷한 카드 후보</div>`,
        ...matches.map((item, index) => (
          `<button class="suggestion ${index === 0 ? "best" : ""}" type="button" data-card="${escapeHtml(item.card)}">${escapeHtml(item.card)}</button>`
        ))
      ].join("");

      if (!matches.length) {
        $("suggestions").innerHTML = `<div class="suggestion-label">비슷한 카드 후보가 없습니다.</div>`;
        return;
      }

      document.querySelectorAll("[data-card]").forEach((button) => {
        button.addEventListener("click", () => {
          $("cardName").value = button.dataset.card;
          updateSuggestions();
          updateRarityFromAPI(button.dataset.card);
        });
      });
    }

    function suggestCards(input, limit = 5) {
      if (!input) {
        return cards.slice(0, limit).map((card) => ({ card, score: 1 }));
      }

      const cleaned = stripCommandWords(input);
      const q = normalizeCardText(cleaned || input);
      return cards
        .map((card) => ({ card, score: cardScore(q, card) }))
        .sort((a, b) => b.score - a.score || a.card.localeCompare(b.card, "ko"))
        .slice(0, limit)
        .filter((item) => item.score > 8);
    }

    function cardScore(query, card) {
      const cardKey = normalizeCardText(card);
      const aliases = (cardAliases.get(card) || []).map(normalizeCardText);
      const keys = [cardKey, ...aliases];
      return Math.max(...keys.map((key) => similarity(query, key)));
    }

    function similarity(a, b) {
      if (!a || !b) {
        return 0;
      }

      if (b.includes(a) || a.includes(b)) {
        return Math.max(a.length, b.length) * 6 + 30;
      }

      const distance = levenshtein(a, b);
      const maxLength = Math.max(a.length, b.length);
      const editScore = Math.max(0, 32 - Math.round((distance / maxLength) * 32));
      const charScore = sharedCharacterScore(a, b);
      const orderScore = orderedSubsequenceScore(a, b);
      return editScore + charScore + orderScore;
    }

    function sharedCharacterScore(a, b) {
      let score = 0;
      for (const char of new Set(a)) {
        if (b.includes(char)) {
          score += 3;
        }
      }
      return score;
    }

    function orderedSubsequenceScore(a, b) {
      let score = 0;
      let cursor = 0;
      for (const char of a) {
        const index = b.indexOf(char, cursor);
        if (index >= 0) {
          score += 2;
          cursor = index + 1;
        }
      }
      return score;
    }

    function levenshtein(a, b) {
      const previous = Array.from({ length: b.length + 1 }, (_, index) => index);
      const current = Array.from({ length: b.length + 1 }, () => 0);

      for (let i = 1; i <= a.length; i += 1) {
        current[0] = i;
        for (let j = 1; j <= b.length; j += 1) {
          const cost = a[i - 1] === b[j - 1] ? 0 : 1;
          current[j] = Math.min(
            current[j - 1] + 1,
            previous[j] + 1,
            previous[j - 1] + cost
          );
        }
        for (let j = 0; j <= b.length; j += 1) {
          previous[j] = current[j];
        }
      }

      return previous[b.length];
    }

    function saveParsed() {
      const item = {
        cardName: $("cardName").value.trim(),
        rarity: $("rarity").value,
        condition: $("condition").value,
        language: $("language").value,
        quantity: Math.max(1, Number($("quantity").value) || 1),
        action: $("action").value,
        updatedAt: new Date().toISOString()
      };

      if (!item.cardName) {
        setStatus("카드명을 입력해야 재고에 반영할 수 있습니다.");
        $("cardName").focus();
        return;
      }

      const index = inventory.findIndex((row) => (
        row.cardName === item.cardName &&
        row.rarity === item.rarity &&
        row.condition === item.condition &&
        row.language === item.language
      ));

      const delta = item.action === "add" ? item.quantity : -item.quantity;

      if (index >= 0) {
        inventory[index].quantity += delta;
        inventory[index].updatedAt = item.updatedAt;
        if (inventory[index].quantity <= 0) {
          inventory.splice(index, 1);
        }
      } else if (delta > 0) {
        inventory.push({
          cardName: item.cardName,
          rarity: item.rarity,
          condition: item.condition,
          language: item.language,
          quantity: item.quantity,
          updatedAt: item.updatedAt
        });
      } else {
        setStatus("차감할 기존 재고가 없습니다.");
        return;
      }

      saveInventory();
      renderInventory();
      setStatus("재고에 반영했습니다.");
    }

    function renderInventory() {
      const query = normalize($("search").value || "");
      const rows = inventory
        .filter((item) => normalize(`${item.cardName} ${item.rarity} ${item.condition} ${item.language}`).includes(query))
        .sort((a, b) => b.updatedAt.localeCompare(a.updatedAt));

      $("inventoryBody").innerHTML = rows.map((item, index) => `
        <tr>
          <td><strong>${escapeHtml(item.cardName)}</strong></td>
          <td><span class="badge ${isHighRarity(item.rarity) ? "gold" : ""}">${escapeHtml(item.rarity)}</span></td>
          <td class="qty">${item.quantity}</td>
          <td>${formatDate(item.updatedAt)}</td>
          <td>
            <div class="mini-actions">
              <button class="icon-btn" type="button" title="수량 추가" data-plus="${index}">+</button>
              <button class="icon-btn" type="button" title="수량 차감" data-minus="${index}">-</button>
            </div>
          </td>
        </tr>
      `).join("");

      document.querySelectorAll("[data-plus]").forEach((button) => {
        button.addEventListener("click", () => adjustQuantity(rows[Number(button.dataset.plus)], 1));
      });

      document.querySelectorAll("[data-minus]").forEach((button) => {
        button.addEventListener("click", () => adjustQuantity(rows[Number(button.dataset.minus)], -1));
      });

      $("empty").style.display = rows.length ? "none" : "block";
    }

    function adjustQuantity(target, delta) {
      const index = inventory.findIndex((item) => item === target);
      if (index < 0) {
        return;
      }
      inventory[index].quantity += delta;
      inventory[index].updatedAt = new Date().toISOString();
      if (inventory[index].quantity <= 0) {
        inventory.splice(index, 1);
      }
      saveInventory();
      renderInventory();
    }

    function clearInventory() {
      if (!inventory.length) {
        setStatus("초기화할 재고가 없습니다.");
        return;
      }
      const ok = confirm("현재 재고를 모두 초기화할까요?");
      if (!ok) {
        return;
      }
      inventory = [];
      saveInventory();
      renderInventory();
      setStatus("재고를 초기화했습니다.");
    }

    function isHighRarity(rarity) {
      return !["Common", "Rare", "Super Rare"].includes(rarity);
    }

    function setStatus(message) {
      $("status").textContent = message;
    }

    function saveInventory() {
      localStorage.setItem(storageKey, JSON.stringify(inventory));
    }

    function loadInventory() {
      try {
        return JSON.parse(localStorage.getItem(storageKey)) || [];
      } catch {
        return [];
      }
    }

    function formatDate(value) {
      return new Intl.DateTimeFormat("ko-KR", {
        month: "2-digit",
        day: "2-digit",
        hour: "2-digit",
        minute: "2-digit"
      }).format(new Date(value));
    }

    function escapeRegExp(value) {
      return value.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
    }

    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    init();
  </script>
</body>
</html>
