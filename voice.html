<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>음성인식 OCG 재고관리</title>
  <link rel="manifest" href="./manifest.json">
  <meta name="theme-color" content="#2563eb">
  <link rel="icon" href="./icon-192.png">
  <link rel="apple-touch-icon" href="./icon-192.png">
  <style>
    :root {
      color-scheme: light;
      --ink: #18212f; --muted: #667085; --line: #d7dee9;
      --panel: #ffffff; --soft: #f5f7fb;
      --brand: #2563eb; --brand-dark: #1d4ed8;
      --green: #178a54; --red: #c2413b; --gold: #b58117;
      --shadow: 0 18px 45px rgba(24,33,47,.12);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif;
      color: var(--ink);
      background:
        linear-gradient(180deg, rgba(255,255,255,.9), rgba(245,247,251,.96)),
        radial-gradient(circle at 15% 0%, rgba(37,99,235,.16), transparent 34%),
        radial-gradient(circle at 86% 12%, rgba(181,129,23,.13), transparent 30%),
        #f5f7fb;
      min-height: 100vh;
    }
    button, input, select, textarea { font: inherit; }
    button { border: 0; cursor: pointer; }

    .app { width: min(960px, calc(100% - 24px)); margin: 0 auto; padding: 20px 0 40px; }

    header { padding: 8px 0 18px; }
    h1 { margin: 0; font-size: clamp(22px, 3.5vw, 36px); line-height: 1.1; }
    .subtitle { margin: 6px 0 0; color: var(--muted); font-size: 14px; }

    /* 탭 */
    .tabs { display: flex; gap: 0; border-bottom: 2px solid var(--line); margin-bottom: 18px; }
    .tab-btn {
      padding: 10px 20px; background: none; border: none; font-size: 14px; font-weight: 700;
      color: var(--muted); border-bottom: 2px solid transparent; margin-bottom: -2px; cursor: pointer;
    }
    .tab-btn.active { color: var(--brand); border-bottom-color: var(--brand); }
    .tab-pane { display: none; }
    .tab-pane.active { display: block; }

    .section {
      background: rgba(255,255,255,.9); border: 1px solid var(--line);
      border-radius: 8px; box-shadow: var(--shadow); overflow: hidden;
    }
    .section-head {
      display: flex; align-items: center; justify-content: space-between;
      gap: 12px; padding: 14px 16px; border-bottom: 1px solid var(--line);
      background: rgba(245,247,251,.72);
    }
    h2 { margin: 0; font-size: 16px; }
    .body { padding: 16px; }

    /* 음성 패드 — 카드 이미지 + 말하기 1:1 */
    .voice-pad {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      align-items: stretch;
    }
    .card-preview-wrap {
      border-radius: 8px; border: 1px solid var(--line);
      background: var(--soft); display: flex; align-items: center;
      justify-content: center; min-height: 90px; overflow: hidden;
    }
    .card-preview-wrap img { width: 100%; height: 100%; object-fit: contain; display: block; }
    .card-preview-placeholder { color: var(--muted); font-size: 13px; text-align: center; padding: 16px; }

    .mic {
      min-height: 90px; border-radius: 8px;
      background: var(--brand); color: #fff;
      display: grid; place-items: center;
      box-shadow: inset 0 -12px 28px rgba(0,0,0,.14);
      transition: transform .12s ease, background .12s ease;
    }
    .mic:active { transform: translateY(1px); }
    .mic.listening { background: var(--red); }
    .mic-mark { display: grid; gap: 7px; place-items: center; font-weight: 800; }
    .mic-symbol {
      width: 40px; height: 40px; border-radius: 50%;
      border: 3px solid currentColor; display: grid;
      place-items: center; font-size: 22px; line-height: 1;
    }

    textarea {
      width: 100%; min-height: 44px; max-height: 80px;
      resize: none; border: 1px solid var(--line);
      border-radius: 8px; padding: 10px 12px;
      color: var(--ink); background: #fff; outline: none;
      font-size: 14px; line-height: 1.5;
    }
    textarea:focus { border-color: var(--brand); box-shadow: 0 0 0 3px rgba(37,99,235,.14); }

    .suggestions {
      margin-top: 10px; display: flex; gap: 7px;
      flex-wrap: wrap; align-items: center;
    }
    .suggestion {
      border: 1px solid #c8d7f5; background: #f4f7ff; color: var(--brand-dark);
      border-radius: 999px; padding: 5px 10px; font-size: 13px; cursor: pointer;
    }
    .suggestion.best { background: #e9f8f0; color: var(--green); border-color: #a7dfbf; }
    .suggestion-label { width: 100%; color: var(--muted); font-size: 12px; font-weight: 800; }

    .parse-grid {
      display: grid; grid-template-columns: repeat(3, minmax(0,1fr));
      gap: 10px; margin-top: 14px;
    }
    label { display: grid; gap: 5px; color: var(--muted); font-size: 12px; font-weight: 700; }
    input, select {
      width: 100%; min-height: 40px; border: 1px solid var(--line);
      border-radius: 8px; background: #fff; padding: 0 10px;
      color: var(--ink); outline: none; font-size: 14px;
    }
    input:focus, select:focus {
      border-color: var(--brand); box-shadow: 0 0 0 3px rgba(37,99,235,.14);
    }

    .action-btns { display: flex; gap: 10px; margin-top: 14px; }
    .btn-add, .btn-remove {
      flex: 1; min-height: 44px; border-radius: 8px;
      font-weight: 800; font-size: 15px; color: #fff;
      display: inline-flex; align-items: center; justify-content: center; gap: 6px;
    }
    .btn-add { background: var(--green); }
    .btn-remove { background: var(--red); }

    .status { margin-top: 10px; color: var(--muted); font-size: 13px; min-height: 18px; }

    /* 재고 탭 툴바 */
    .inventory-toolbar {
      display: flex; gap: 8px; align-items: center;
    }
    .inventory-toolbar input { min-height: 36px; flex: 1; font-size: 13px; }
    .btn-export {
      min-height: 36px; padding: 0 14px; border-radius: 8px;
      background: #eef3fb; color: var(--ink); border: 1px solid var(--line);
      font-weight: 700; font-size: 13px; white-space: nowrap;
      display: inline-flex; align-items: center; gap: 6px;
    }

    .table-wrap { overflow: auto; }
    table { width: 100%; border-collapse: collapse; min-width: 360px; }
    th, td {
      padding: 11px 10px; text-align: left;
      border-bottom: 1px solid var(--line); font-size: 14px; vertical-align: middle;
    }
    th { color: var(--muted); font-size: 12px; background: var(--soft); }
    .qty { width: 60px; font-weight: 800; }
    .badge {
      display: inline-flex; align-items: center; min-height: 24px;
      border-radius: 999px; padding: 0 9px; background: #f4f7ff;
      color: var(--brand-dark); border: 1px solid #d9e4ff;
      font-size: 12px; font-weight: 700; white-space: nowrap;
    }
    .badge.gold { background: #fff8e8; color: #7a520c; border-color: #f1d79b; }
    .empty { padding: 36px 16px; text-align: center; color: var(--muted); }
    .mini-actions { display: flex; gap: 5px; justify-content: flex-end; }
    .icon-btn {
      width: 32px; height: 32px; border-radius: 6px;
      border: 1px solid var(--line); background: #fff;
      color: var(--ink); display: inline-grid; place-items: center; font-weight: 900;
    }

    @media (max-width: 560px) {
      .parse-grid { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>
<div class="app">
  <header>
    <h1>음성인식 OCG 재고관리</h1>
    <p class="subtitle">카드명과 레어도를 말하면 재고 초안으로 변환합니다.</p>
  </header>

  <div class="tabs">
    <button class="tab-btn active" data-tab="register">📢 음성 등록</button>
    <button class="tab-btn" data-tab="inventory">📦 재고 목록</button>
  </div>

  <!-- 음성 등록 탭 -->
  <div class="tab-pane active" id="tab-register">
    <div class="section">
      <div class="section-head"><h2>음성 등록</h2></div>
      <div class="body">

        <!-- 카드 이미지 + 말하기 1:1 -->
        <div class="voice-pad">
          <div class="card-preview-wrap" id="cardPreviewWrap">
            <div class="card-preview-placeholder">카드 인식 후<br>이미지 표시</div>
          </div>
          <button class="mic" id="micBtn" type="button" aria-label="음성 입력 시작">
            <span class="mic-mark">
              <span class="mic-symbol">●</span>
              <span id="micLabel">말하기</span>
            </span>
          </button>
        </div>

        <!-- 인식 텍스트 (1줄) -->
        <textarea id="transcript" rows="1"
          placeholder="예: 푸른 눈의 백룡 시크릿 레어 두 장 추가"
          style="margin-top:12px;"></textarea>

        <div class="suggestions" id="suggestions"></div>

        <div class="parse-grid">
          <label>카드명
            <input id="cardName" list="cardNames" autocomplete="off">
            <datalist id="cardNames"></datalist>
          </label>
          <label>레어도
            <select id="rarity"></select>
          </label>
          <label>수량
            <div style="display:flex;align-items:center;gap:4px;">
              <button id="qtyMinusBtn" type="button" style="width:32px;height:32px;border:1px solid #ccc;border-radius:6px;background:#f5f7fb;font-size:16px;cursor:pointer;">－</button>
              <input id="quantity" type="number" min="1" value="1" style="flex:1;text-align:center;">
              <button id="qtyPlusBtn" type="button" style="width:32px;height:32px;border:1px solid #ccc;border-radius:6px;background:#f5f7fb;font-size:16px;cursor:pointer;">＋</button>
            </div>
          </label>
        </div>
        <div style="margin-top:6px;">
          <button id="registerCardBtn" type="button" style="background:none;border:1px solid #ccc;border-radius:6px;padding:4px 10px;font-size:12px;color:#555;cursor:pointer;">
            + 목록에 없는 카드명 새로 등록
          </button>
        </div>

        <!-- 숨김 (파싱 로직 유지용) -->
        <select id="action" style="display:none"><option value="add">추가</option><option value="remove">차감</option></select>
        <select id="condition" style="display:none"><option value="NM">NM</option></select>
        <select id="language" style="display:none"><option value="KR">한국어</option></select>

        <div class="status" id="status"></div>

        <div class="action-btns">
          <button class="btn-add" id="addBtn">＋ 입고</button>
          <button class="btn-remove" id="removeBtn">－ 출고</button>
        </div>
      </div>
    </div>
  </div>

  <!-- 재고 목록 탭 -->
  <div class="tab-pane" id="tab-inventory">
    <div class="section">
      <div class="section-head">
        <h2>재고 목록</h2>
        <div class="inventory-toolbar">
          <input id="search" placeholder="카드명 검색">
          <button class="btn-export" id="exportBtn">⬇ 엑셀 내보내기</button>
        </div>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>카드명</th>
              <th>레어도</th>
              <th>수량</th>
              <th>최근 변경</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="inventoryBody"></tbody>
        </table>
        <div class="empty" id="empty">아직 등록된 카드가 없습니다.</div>
      </div>
    </div>
  </div>
</div>

<!-- Firebase compat -->
<script src="https://www.gstatic.com/firebasejs/12.12.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore-compat.js"></script>

<script>
  // Firebase 초기화
  const firebaseConfig = {
    apiKey: "AIzaSyByx2t4mhxDkBqe97iml3W5w5a8OSw8Qso",
    authDomain: "ocg-stock.firebaseapp.com",
    projectId: "ocg-stock",
    storageBucket: "ocg-stock.firebasestorage.app",
    messagingSenderId: "1015596291596",
    appId: "1:1015596291596:web:ec72caa7bbda8ae1c00029"
  };
  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();
  const INVENTORY_COL = "inventory";

  const storageKey = "ygoVoiceInventory.v2";
  const YGO_API = "https://db.ygoprodeck.com/api/v7/cardinfo.php";
  const CARD_NAMES_URL = "https://angbeesh-rgb.github.io/OCG-STOCK/card_names.json";
  const CARD_CACHE_KEY = "ocg_card_names_cache";
  const CUSTOM_CARDS_COL = "customCardNames";
  const KOR_CID_MAP_URL = "https://angbeesh-rgb.github.io/OCG-STOCK/kor_name_to_cid.json";
  const KOR_CID_CACHE_KEY = "ocg_kor_cid_map_cache";
  let korCidMap = {};

  async function loadKorCidMap() {
    try {
      const cached = JSON.parse(localStorage.getItem(KOR_CID_CACHE_KEY) || 'null');
      if (cached && cached.ts && Date.now() - cached.ts < 86400000 && cached.map) {
        korCidMap = cached.map;
        return;
      }
      const res = await fetch(KOR_CID_MAP_URL);
      if (!res.ok) throw new Error("fetch 실패");
      korCidMap = await res.json();
      localStorage.setItem(KOR_CID_CACHE_KEY, JSON.stringify({ ts: Date.now(), map: korCidMap }));
    } catch(e) {
      console.error("코나미 cid 매핑 로드 실패:", e);
      korCidMap = {};
    }
  }

  const KONAMI_IMG_CACHE_KEY = "ocg_konami_img_cache";
  function getKonamiImgCache() {
    try { return JSON.parse(localStorage.getItem(KONAMI_IMG_CACHE_KEY) || "{}"); }
    catch { return {}; }
  }
  function setKonamiImgCache(cache) {
    try { localStorage.setItem(KONAMI_IMG_CACHE_KEY, JSON.stringify(cache)); } catch {}
  }

  async function fetchKonamiImage(cardName) {
    const cache = getKonamiImgCache();
    if (cardName in cache) return cache[cardName]; // 캐시 있으면 네트워크 요청 없이 바로 반환

    const cid = korCidMap[cardName];
    if (!cid) return null;
    try {
      const res = await fetch(OCR_WORKER_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ konamiCid: cid })
      });
      const data = await res.json();
      const imageUrl = data.imageUrl || null;
      cache[cardName] = imageUrl;
      setKonamiImgCache(cache);
      return imageUrl;
    } catch(e) {
      console.error("코나미 이미지 조회 실패:", e);
      return null;
    }
  }

  const $ = id => document.getElementById(id);
  let cards = [];
  let inventory = loadInventory();

  /* ── Firestore ── */
  async function saveToFirestore(item) {
    const id = (item.cardName + "_" + item.rarity).replace(/[^a-zA-Z0-9가-힣_]/g, "_");
    await db.collection(INVENTORY_COL).doc(id).set(item, { merge: true });
  }

  async function deleteFromFirestore(cardName, rarity) {
    const id = (cardName + "_" + rarity).replace(/[^a-zA-Z0-9가-힣_]/g, "_");
    await db.collection(INVENTORY_COL).doc(id).delete();
  }

  async function syncFromFirestore() {
    try {
      setStatus("Firestore에서 재고 불러오는 중...");
      const snap = await db.collection(INVENTORY_COL).get();
      const items = snap.docs.map(d => d.data());
      if (items.length > 0) {
        inventory = items;
        localStorage.setItem(storageKey, JSON.stringify(inventory));
        renderInventory();
        setStatus("재고 " + items.length + "개 동기화 완료");
      } else {
        setStatus("저장된 재고가 없어.");
      }
    } catch(e) {
      console.error("Firestore 동기화 실패:", e);
      setStatus("Firestore 동기화 실패 — 로컬 데이터로 동작 중");
    }
  }

  function saveInventory(changedCard, removed) {
    localStorage.setItem(storageKey, JSON.stringify(inventory));
    if (!changedCard) return; // 변경분 없으면(예: 최초 로드) Firestore 호출 안 함
    if (removed) {
      deleteFromFirestore(changedCard.cardName, changedCard.rarity)
        .catch(e => console.error("Firestore 삭제 실패:", changedCard.cardName, e));
    } else {
      saveToFirestore(changedCard)
        .catch(e => console.error("Firestore 저장 실패:", changedCard.cardName, e));
    }
  }

  function loadInventory() {
    try { return JSON.parse(localStorage.getItem(storageKey)) || []; } catch { return []; }
  }

  /* ── 커스텀 카드명 (DB에 없는 신규 카드 사용자 등록) ── */
  async function saveCustomCardName(name) {
    const id = name.replace(/[^a-zA-Z0-9가-힣_]/g, "_");
    await db.collection(CUSTOM_CARDS_COL).doc(id).set({ name, addedAt: new Date().toISOString() });
  }

  async function loadCustomCardNames() {
    try {
      const snap = await db.collection(CUSTOM_CARDS_COL).get();
      return snap.docs.map(d => d.data().name).filter(Boolean);
    } catch(e) {
      console.error("커스텀 카드명 로드 실패:", e);
      return [];
    }
  }

  function registerNewCard() {
    const name = $("cardName").value.trim();
    if (!name) { setStatus("등록할 카드명을 입력해줘."); return; }
    if (cards.includes(name)) { setStatus(`"${name}" 은 이미 카드 목록에 있어.`); return; }
    setStatus(`"${name}" 등록 중...`);
    saveCustomCardName(name)
      .then(() => {
        cards.push(name);
        updateDatalist();
        setStatus(`"${name}" 새 카드명으로 등록 완료. (이미지는 DB에 없어서 안 뜰 수 있어)`);
      })
      .catch(e => setStatus("등록 실패: " + e.message));
  }

  /* ── 카드 목록 로드 ── */
  async function loadCardNames() {
    try {
      const cached = JSON.parse(localStorage.getItem(CARD_CACHE_KEY) || 'null');
      if (cached && cached.ts && Date.now() - cached.ts < 86400000 && cached.names?.length) {
        cards = cached.names;
        setStatus(`카드 목록 ${cards.length.toLocaleString()}개 로드 완료 (캐시)`);
      } else {
        setStatus("카드 목록 불러오는 중...");
        const res = await fetch(CARD_NAMES_URL);
        if (!res.ok) throw new Error("fetch 실패");
        cards = await res.json();
        localStorage.setItem(CARD_CACHE_KEY, JSON.stringify({ ts: Date.now(), names: cards }));
        setStatus(`카드 목록 ${cards.length.toLocaleString()}개 로드 완료`);
      }
    } catch(e) {
      cards = fallbackCards;
      setStatus(`카드 목록 로드 실패 — 기본 목록(${cards.length}개)으로 동작 중`);
    }
    // 사용자가 등록한 커스텀 카드명 병합 (다른 기기에서 등록한 것도 포함)
    const custom = await loadCustomCardNames();
    custom.forEach(name => { if (!cards.includes(name)) cards.push(name); });
    updateDatalist();
  }

  function updateDatalist() {
    const dl = $("cardNames");
    dl.innerHTML = "";
    cards.forEach(name => {
      const o = document.createElement("option");
      o.value = name; dl.appendChild(o);
    });
  }

  const fallbackCards = [
    "푸른 눈의 백룡","블랙 매지션","붉은 눈의 흑룡","하루 우라라","증식의 G",
    "저택 와라시","유령토끼","드롤 & 로크 버드","무한포영","말살의 지명자",
    "무덤의 지명자","원시생명체 니비루","공아단의 영웅 라팔"
  ];
  async function fetchCardPrints(name) {
    try {
      // 1차: 정확한 이름으로 조회
      let res = await fetch(`${YGO_API}?name=${encodeURIComponent(name)}&language=ko`);
      let data = res.ok ? await res.json() : null;
      let card = data?.data?.[0];

      // 2차: 부분 검색으로 폴백 — 결과 중 카드명이 가장 유사한 것 선택
      if (!card) {
        res = await fetch(`${YGO_API}?fname=${encodeURIComponent(name)}&language=ko`);
        data = res.ok ? await res.json() : null;
        if (data?.data?.length) {
          // 입력 카드명과 가장 유사한 카드 선택 (단순히 첫 번째 X)
          const nameNorm = normalize(name);
          card = data.data.reduce((best, c) => {
            const cNorm = normalize(c.name || "");
            const bestNorm = normalize(best.name || "");
            const cScore = similarity(nameNorm, cNorm);
            const bestScore = similarity(nameNorm, bestNorm);
            return cScore > bestScore ? c : best;
          });
        }
      }

      if (!card) return null;

      const rarities = card.card_sets
        ? [...new Set(card.card_sets.map(s => s.set_rarity))].sort()
        : [];
      const imageUrl = card.card_images?.[0]?.image_url_small || null;
      return { name: card.name, rarities, imageUrl, sets: card.card_sets };
    } catch(e) {
      return null;
    }
  }

  async function updateRarityFromAPI(cardName, voiceRarity = "") {
    if (!cardName) return;

  /* ── 음성 인식 (Google Cloud Speech-to-Text, Worker 경유) ── */
  function setupSpeech() {
    if (!navigator.mediaDevices?.getUserMedia || !window.MediaRecorder) {
      setStatus("이 브라우저는 음성 녹음을 지원하지 않습니다. 문장을 직접 입력해도 됩니다.");
    }
  }

  function toggleMic() {
    if (listening) stopRecording();
    else startRecording();
  }

  async function startRecording() {
    if (listening) return;
    try {
      mediaStream = await navigator.mediaDevices.getUserMedia({ audio: true });
    } catch(e) {
      setStatus("마이크 권한이 차단되었습니다. 브라우저 권한 설정에서 마이크를 허용해주세요.");
      return;
    }
    listening = true; heardSpeech = false;
    $("micBtn").classList.add("listening");
    $("micLabel").textContent = "듣는 중";
    setStatus("듣고 있습니다.");

    audioChunks = [];
    const mimeType = MediaRecorder.isTypeSupported("audio/webm;codecs=opus") ? "audio/webm;codecs=opus" : "audio/webm";
    mediaRecorder = new MediaRecorder(mediaStream, { mimeType });
    mediaRecorder.ondataavailable = e => { if (e.data.size > 0) audioChunks.push(e.data); };
    mediaRecorder.onstop = handleRecordingStop;
    mediaRecorder.start();

    startVAD();
    clearTimeout(silenceTimer);
    silenceTimer = setTimeout(() => { if (listening) stopRecording(); }, VAD_MAX_MS);
  }

  function startVAD() {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const source = audioCtx.createMediaStreamSource(mediaStream);
    const analyser = audioCtx.createAnalyser();
    analyser.fftSize = 512;
    source.connect(analyser);
    const data = new Uint8Array(analyser.frequencyBinCount);
    vadSilenceStart = null;
    const recordStart = Date.now();

    function tick() {
      if (!listening) return;
      analyser.getByteTimeDomainData(data);
      let sumSq = 0;
      for (let i=0;i<data.length;i++) { const v = (data[i]-128)/128; sumSq += v*v; }
      const rms = Math.sqrt(sumSq/data.length);

      if (rms > VAD_THRESHOLD) {
        heardSpeech = true;
        vadSilenceStart = null;
        setStatus("음성 감지됨.");
      } else if (heardSpeech) {
        if (vadSilenceStart === null) vadSilenceStart = Date.now();
        else if (Date.now() - vadSilenceStart > VAD_SILENCE_MS) { stopRecording(); return; }
      }
      if (Date.now() - recordStart > VAD_MAX_MS) { stopRecording(); return; }
      vadRaf = requestAnimationFrame(tick);
    }
    vadRaf = requestAnimationFrame(tick);
  }

  function stopRecording() {
    if (!listening) return;
    listening = false;
    clearTimeout(silenceTimer);
    if (vadRaf) cancelAnimationFrame(vadRaf);
    $("micBtn").classList.remove("listening");
    $("micLabel").textContent = "말하기";
    if (mediaRecorder && mediaRecorder.state !== "inactive") mediaRecorder.stop();
    if (mediaStream) mediaStream.getTracks().forEach(t => t.stop());
    if (audioCtx) { audioCtx.close(); audioCtx = null; }
    if (!heardSpeech) setStatus("음성이 감지되지 않았습니다. 마이크 권한을 확인해주세요.");
  }

  async function handleRecordingStop() {
    if (!heardSpeech) return;
    setStatus("인식 중...");
    const blob = new Blob(audioChunks, { type: (mediaRecorder && mediaRecorder.mimeType) || "audio/webm" });
    const base64 = await blobToBase64(blob);
    const phrases = buildPhraseHints();

    try {
      const res = await fetch(OCR_WORKER_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ audio: base64, phrases })
      });
      const data = await res.json();
      if (data.error) { setStatus("음성 인식 실패: " + data.error); return; }
      const transcripts = data.transcripts || [];
      if (!transcripts.length) { setStatus("음성을 인식하지 못했습니다. 다시 시도해주세요."); return; }
      parseBestFromAlternatives(transcripts);
    } catch(e) {
      setStatus("음성 인식 서버 연결 실패: " + e.message);
    }
  }

  function blobToBase64(blob) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onloadend = () => resolve(reader.result.split(",")[1]);
      reader.onerror = reject;
      reader.readAsDataURL(blob);
    });
  }

  function buildPhraseHints() {
    const seen = new Set();
    const hints = [];
    function addAll(list) {
      for (const name of list) {
        if (hints.length >= 5000) return;
        if (!seen.has(name)) { seen.add(name); hints.push(name); }
      }
    }
    // 1순위: 이미 등록된 내 재고 카드명 (반복 등록/출고 가능성 높음)
    addAll(inventory.map(i => i.cardName));
    // 2순위: 나머지 전체 카드 목록으로 5000개까지 채움
    if (hints.length < 5000) addAll(cards);
    return hints;
  }

  /* ── 여러 음성 후보에서 최고 매칭 카드 선택 ── */
  function parseBestFromAlternatives(transcripts) {
    let bestCard = null, bestScore = -1, bestTranscript = transcripts[0];
    let bestRarity = "", bestQuantity = 1, bestAction = "add";

    transcripts.forEach(text => {
      const normalized = normalize(text);
      const candidates = suggestCards(text, 3);
      const cardName = findCardName(text, normalized, candidates);
      const score = candidates.length ? candidates[0].score : 0;

      if (score > bestScore) {
        bestScore = score;
        // 퍼지 매칭 1위로 자동 교정 (candidates[0]이 가장 높은 점수)
        bestCard = candidates.length ? candidates[0].card : cardName;
        bestTranscript = text;
        bestRarity = findAlias(normalized, rarityAliases) || "";
        bestQuantity = findQuantity(normalized);
        bestAction = findAlias(normalized, actionAliases) || "add";
      }
    });

    // 인식 텍스트를 교정된 카드명으로 표시
    $("transcript").value = bestTranscript;
    if (bestCard) $("cardName").value = bestCard;
    $("quantity").value = bestQuantity;
    $("action").value = bestAction;

    updateSuggestions(suggestCards(bestTranscript, 5));
    if (bestCard) {
      // API에서 레어도 가져온 후 음성 인식된 레어도 자동 선택
      updateRarityFromAPI(bestCard, bestRarity);
    } else {
      setStatus("카드명을 찾지 못했습니다. 후보를 선택하거나 직접 입력해주세요.");
    }
  }

  /* ── 파싱 ── */
  function normalize(text) { return text.toLowerCase().replace(/\s+/g," ").trim(); }

  function normalizeCardText(text) {
    return normalize(text)
      .replace(/&/g,"앤").replace(/[^\u3131-\u318e\uac00-\ud7a3a-z0-9]/g,"")
      .replace(/드래곤/g,"드레곤").replace(/매지션/g,"메지션").replace(/블랙/g,"블렉")
      .replace(/크샤트리라/g,"크샤").replace(/티아라멘츠/g,"티아라").replace(/스프라이트/g,"스프")
      .replace(/증식의지/g,"증식의g").replace(/증식지/g,"증식의g").replace(/증지/g,"증식의g")
      .replace(/지$/g,"g");
  }

  function stripCommandWords(text) {
    const removals = [
      ...rarityAliases.flatMap(i=>i.words), ...conditionAliases.flatMap(i=>i.words),
      ...actionAliases.flatMap(i=>i.words), "레어","한국어","일본어","영어","카드","좀","으로"
    ];
    let cleaned = text
      .replace(/\d+\s*(장|개|매)/g,"")
      .replace(/[한하나일두둘이세셋삼네넷사다섯오여섯육일곱칠여덟팔아홉구열십]+\s*(장|개|매)/g,"")
      .trim();
    for (const w of removals) cleaned = cleaned.replace(new RegExp(escapeRegExp(w),"gi"),"");
    return cleaned.replace(/\s+/g," ").trim();
  }

  function parseTranscript() {
    const text = $("transcript").value.trim();
    const normalized = normalize(text);
    if (!text) { setStatus("등록할 문장을 말하거나 입력해주세요."); return; }
    const rarity = findAlias(normalized, rarityAliases) || "Common";
    const condition = findAlias(normalized, conditionAliases) || "NM";
    const action = findAlias(normalized, actionAliases) || "add";
    const quantity = findQuantity(normalized);
    const candidates = suggestCards(text, 5);
    const cardName = findCardName(text, normalized, candidates);
    $("rarity").value = rarity;
    $("condition").value = condition;
    $("action").value = action;
    $("quantity").value = quantity;
    $("cardName").value = cardName;
    updateSuggestions(candidates);
    if (cardName) updateRarityFromAPI(cardName);
    else setStatus("카드명을 찾지 못했습니다. 후보를 선택하거나 직접 입력해주세요.");
  }

  function findAlias(text, groups) {
    for (const g of groups)
      if (g.words.some(w => text.includes(w.toLowerCase()))) return g.value;
    return "";
  }

  function findQuantity(text) {
    const m = text.match(/(\d+)\s*(장|개|매)?/);
    if (m) return Math.max(1, Number(m[1]));
    for (const [w,n] of koreanNumbers)
      if (new RegExp(`${w}\\s*(장|개|매)?`).test(text)) return n;
    return 1;
  }

  function findCardName(rawText, normalized, candidates=[]) {
    const direct = cards.find(c => normalized.includes(normalize(c)));
    if (direct) return direct;
    const compactText = normalized.replace(/\s/g,"");
    const compact = cards.find(c => compactText.includes(normalize(c).replace(/\s/g,"")));
    if (compact) return compact;
    for (const [card, aliases] of cardAliases)
      if (aliases.some(a => normalizeCardText(rawText).includes(normalizeCardText(a)))) return card;
    if (candidates.length && candidates[0].score >= 42) return candidates[0].card;
    return stripCommandWords(rawText);
  }

  function updateSuggestions(precomputed=null) {
    const input = $("cardName").value.trim() || $("transcript").value.trim();
    const matches = precomputed || suggestCards(input, 6);
    $("suggestions").innerHTML = [
      `<div class="suggestion-label">비슷한 카드 후보</div>`,
      ...matches.map((item,i) =>
        `<button class="suggestion ${i===0?"best":""}" type="button" data-card="${escapeHtml(item.card)}">${escapeHtml(item.card)}</button>`)
    ].join("");
    if (!matches.length) { $("suggestions").innerHTML=`<div class="suggestion-label">후보가 없습니다.</div>`; return; }
    document.querySelectorAll("[data-card]").forEach(btn => {
      btn.addEventListener("click", () => {
        $("cardName").value = btn.dataset.card;
        updateSuggestions();
        updateRarityFromAPI(btn.dataset.card);
      });
    });
  }

  function suggestCards(input, limit=5) {
    if (!input) return cards.slice(0,limit).map(card=>({card,score:1}));
    const cleaned = stripCommandWords(input);
    const q = normalizeCardText(cleaned||input);
    return cards.map(card=>({card,score:cardScore(q,card)}))
      .sort((a,b)=>b.score-a.score||a.card.localeCompare(b.card,"ko"))
      .slice(0,limit).filter(i=>i.score>8);
  }

  function cardScore(query, card) {
    const cardKey = normalizeCardText(card);
    const aliases = (cardAliases.get(card)||[]).map(normalizeCardText);
    return Math.max(...[cardKey,...aliases].map(k=>similarity(query,k)));
  }

  function similarity(a,b) {
    if (!a||!b) return 0;
    if (b.includes(a)||a.includes(b)) {
      const lenBonus = Math.max(0, 20 - Math.abs(a.length - b.length) * 3);
      return Math.max(a.length,b.length)*6+30+lenBonus;
    }
    const distance = levenshtein(a,b);
    const maxLen = Math.max(a.length,b.length);
    const lenProximity = Math.max(0, 15 - Math.abs(a.length - b.length) * 2);
    return Math.max(0,32-Math.round((distance/maxLen)*32))+sharedCharScore(a,b)+orderedSubScore(a,b)+lenProximity;
  }

  function sharedCharScore(a,b) {
    let s=0; for (const c of new Set(a)) if (b.includes(c)) s+=3; return s;
  }

  function orderedSubScore(a,b) {
    let s=0,cur=0;
    for (const c of a) { const i=b.indexOf(c,cur); if(i>=0){s+=2;cur=i+1;} }
    return s;
  }

  function levenshtein(a,b) {
    const prev=Array.from({length:b.length+1},(_,i)=>i);
    const cur=Array.from({length:b.length+1},()=>0);
    for (let i=1;i<=a.length;i++){
      cur[0]=i;
      for (let j=1;j<=b.length;j++){
        const cost=a[i-1]===b[j-1]?0:1;
        cur[j]=Math.min(cur[j-1]+1,prev[j]+1,prev[j-1]+cost);
      }
      for (let j=0;j<=b.length;j++) prev[j]=cur[j];
    }
    return prev[b.length];
  }

  /* ── 재고 저장 ── */
  function saveParsed() {
    const item = {
      cardName: $("cardName").value.trim(),
      rarity: $("rarity").value,
      quantity: Math.max(1, Number($("quantity").value)||1),
      action: $("action").value,
      updatedAt: new Date().toISOString()
    };
    if (!item.cardName) { setStatus("카드명을 입력해야 합니다."); $("cardName").focus(); return; }
    const idx = inventory.findIndex(r => r.cardName===item.cardName && r.rarity===item.rarity);
    const delta = item.action==="add" ? item.quantity : -item.quantity;
    let changedCard, removed = false;
    if (idx>=0) {
      inventory[idx].quantity += delta;
      inventory[idx].updatedAt = item.updatedAt;
      if (inventory[idx].quantity<=0) {
        changedCard = { cardName: inventory[idx].cardName, rarity: inventory[idx].rarity };
        removed = true;
        inventory.splice(idx,1);
      } else {
        changedCard = inventory[idx];
      }
    } else if (delta>0) {
      const newCard = { cardName:item.cardName, rarity:item.rarity, quantity:item.quantity, updatedAt:item.updatedAt };
      inventory.push(newCard);
      changedCard = newCard;
    } else {
      setStatus("차감할 재고가 없습니다."); return;
    }
    if (!cards.includes(item.cardName)) {
      saveCustomCardName(item.cardName).catch(e => console.error("커스텀 카드명 자동 등록 실패:", e));
      cards.push(item.cardName);
      updateDatalist();
    }
    saveInventory(changedCard, removed);
    renderInventory();
    const verb = item.action==="add" ? "입고" : "출고";
    setStatus(`"${item.cardName}" (${item.rarity}) ${item.quantity}장 ${verb} 완료.`);
  }

  /* ── 재고 렌더 ── */
  function renderInventory() {
    const query = normalize($("search")?.value || "");
    const rows = inventory
      .filter(i => normalize(`${i.cardName} ${i.rarity}`).includes(query))
      .sort((a,b) => b.updatedAt.localeCompare(a.updatedAt));
    $("inventoryBody").innerHTML = rows.map((item,index) => `
      <tr>
        <td><strong>${escapeHtml(item.cardName)}</strong></td>
        <td><span class="badge ${isHighRarity(item.rarity)?"gold":""}">${escapeHtml(item.rarity)}</span></td>
        <td class="qty">${item.quantity}</td>
        <td>${formatDate(item.updatedAt)}</td>
        <td>
          <div class="mini-actions">
            <button class="icon-btn" type="button" data-plus="${index}">+</button>
            <button class="icon-btn" type="button" data-minus="${index}">-</button>
          </div>
        </td>
      </tr>`).join("");
    document.querySelectorAll("[data-plus]").forEach(btn =>
      btn.addEventListener("click", () => adjustQuantity(rows[Number(btn.dataset.plus)], 1)));
    document.querySelectorAll("[data-minus]").forEach(btn =>
      btn.addEventListener("click", () => adjustQuantity(rows[Number(btn.dataset.minus)], -1)));
    $("empty").style.display = rows.length ? "none" : "block";
  }

  function adjustQuantity(target, delta) {
    const idx = inventory.findIndex(i => i===target);
    if (idx<0) return;
    inventory[idx].quantity += delta;
    inventory[idx].updatedAt = new Date().toISOString();
    let changedCard, removed = false;
    if (inventory[idx].quantity<=0) {
      changedCard = { cardName: inventory[idx].cardName, rarity: inventory[idx].rarity };
      removed = true;
      inventory.splice(idx,1);
    } else {
      changedCard = inventory[idx];
    }
    saveInventory(changedCard, removed); renderInventory();
  }

  /* ── 엑셀(CSV) 내보내기 ── */
  function exportToCSV() {
    if (!inventory.length) { alert("내보낼 재고가 없습니다."); return; }
    const header = ["카드명","레어도","수량","최근 변경"];
    const rows = inventory
      .sort((a,b) => a.cardName.localeCompare(b.cardName,"ko"))
      .map(i => [i.cardName, i.rarity, i.quantity, formatDate(i.updatedAt)]);
    const csv = [header, ...rows]
      .map(row => row.map(v => `"${String(v).replace(/"/g,'""')}"`).join(","))
      .join("\n");
    const BOM = "\uFEFF"; // 한글 깨짐 방지
    const blob = new Blob([BOM + csv], { type:"text/csv;charset=utf-8;" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = `OCG재고_${new Date().toISOString().slice(0,10)}.csv`;
    a.click();
    URL.revokeObjectURL(url);
  }

  /* ── 유틸 ── */
  function isHighRarity(r) { return !["Common","Rare","Super Rare"].includes(r); }
  function setStatus(msg) { $("status").textContent = msg; }
  function formatDate(v) {
    return new Intl.DateTimeFormat("ko-KR",{month:"2-digit",day:"2-digit",hour:"2-digit",minute:"2-digit"}).format(new Date(v));
  }
  function escapeRegExp(v) { return v.replace(/[.*+?^${}()|[\]\\]/g,"\\$&"); }
  function escapeHtml(v) {
    return String(v).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#039;");
  }

  init();
  syncFromFirestore();

  if ("serviceWorker" in navigator) {
    window.addEventListener("load", () => {
      navigator.serviceWorker.register("./sw.js").catch(e => console.error("SW 등록 실패:", e));
    });
  }
</script>
